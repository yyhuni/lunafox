# Workflow metadata
metadata:
  name: subdomain_discovery
  display_name: Subdomain Discovery
  description: Discover all subdomains of target domains through reconnaissance, dictionary bruteforce, and permutation
  version: 1.0.0
  target_types: [domain]
  notes:
    global:
      - This workflow may generate active scanning traffic. Use with caution.
    config:
      - Parameters use kebab-case (e.g., timeout-runtime, rate-limit-cli).
      - internal_params are fixed and cannot be overridden in config.
  doc:
    sections:
      - id: workflow
        title: Scan Workflow
      - id: tools
        title: Tool Configuration
      - id: examples
        title: Configuration Examples
      - id: notes
        title: Notes
    labels:
      workflow_includes: "This workflow includes the following stages:"
      properties: Properties
      required_stage: Required stage
      optional_stage: Optional stage
      supports_parallel: Supports parallel execution
      stage_tools: Stage Tools
      tool_name: Tool Name
      workflow_name: Workflow Name
      description: Description
      warning: Warning
      base_command: Base Command
      internal_params: Internal Parameters
      runtime_parameters: Runtime Parameters
      cli_parameters: CLI Parameters
      parameter: Parameter
      type: Type
      default: Default
      required: Required
      yes: Yes
      no: No
      config_example: Configuration Example
      global_notes: Global Notes
      config_notes: Config Notes
      stage_notes: Stage Notes
      tool_notes: Tool Notes
      stage_prefix: Stage
      parallel_execution: parallel execution
    example_header:
      - Subdomain Discovery
      - Discover all subdomains of target domains through reconnaissance, dictionary bruteforce, and permutation
      - Configuration
      - This file is auto-generated from templates.yaml
      - "DO NOT EDIT manually - run: go generate ./internal/workflow/subdomain_discovery/"

  # Stage definitions
  stages:
    - id: recon
      name: Reconnaissance
      description: Collect subdomains from multiple data sources without directly probing the target
      required: true
      parallel: true

    - id: bruteforce
      name: Dictionary Bruteforce
      description: Bruteforce domains using dictionaries to discover unpublished subdomains
      required: false
      parallel: false

    - id: permutation
      name: Permutation
      description: Generate new possible subdomains by permuting discovered subdomains
      required: false
      parallel: false
      notes:
        - Permutation performs a wildcard sampling check before execution and may skip if wildcard is detected.

    - id: resolve
      name: Resolution
      description: Resolve all discovered subdomains to IP addresses and verify they are alive
      required: false
      parallel: false

# Tool templates
tools:
  subfinder:
    metadata:
      display_name: Subfinder
      description: Collect subdomains using multiple data sources (Shodan, Censys, VirusTotal, etc.)
      stage: recon

    base_command: >
      subfinder -d {{.Domain}} -all -o {{quote .OutputFile}} -v{{if .ProviderConfig}} -pc {{quote .ProviderConfig}}{{end}}
    runtime_params:
      - semantic_id: timeout-runtime
        var: Timeout
        config_schema:
          key: timeout-runtime
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 3600
        documentation:
          description: Scan timeout in seconds
    cli_params:
      - semantic_id: threads-cli
        var: Threads
        arg: -t {{.Threads}}
        config_schema:
          key: threads-cli
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 10
        documentation:
          description: Number of concurrent threads

  assetfinder:
    metadata:
      display_name: Assetfinder
      description: Find domain-related assets from multiple data sources
      stage: recon

    base_command: assetfinder --subs-only {{.Domain}} > {{quote .OutputFile}}
    runtime_params:
      - semantic_id: timeout-runtime
        var: Timeout
        config_schema:
          key: timeout-runtime
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 3600
        documentation:
          description: Scan timeout in seconds

  subdomain-bruteforce:
    metadata:
      display_name: Subdomain Bruteforce
      description: DNS bruteforce domains using dictionaries
      stage: bruteforce
    internal_params:
      subdomain-wordlist-base-path-runtime: /opt/lunafox/wordlists
      resolvers-path-cli: /opt/lunafox/wordlists/resolvers.txt

    base_command: puredns bruteforce {{quote .Wordlist}} {{.Domain}} -r {{quote .Resolvers}} --write {{quote .OutputFile}} --quiet
    runtime_params:
      - semantic_id: timeout-runtime
        var: Timeout
        config_schema:
          key: timeout-runtime
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 3600
        documentation:
          description: Scan timeout in seconds
      - semantic_id: subdomain-wordlist-name-runtime
        var: SubdomainWordlistName
        config_schema:
          key: subdomain-wordlist-name-runtime
          type: string
          required: true
        config_example:
          show_as: value
          comment: true
          value: subdomains-top1million-110000.txt
        documentation:
          description: Subdomain wordlist name (stored on server)
    cli_params:
      - semantic_id: threads-cli
        var: Threads
        arg: -t {{.Threads}}
        config_schema:
          key: threads-cli
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 100
        documentation:
          description: Number of concurrent threads
      - semantic_id: rate-limit-cli
        var: RateLimit
        arg: --rate-limit {{.RateLimit}}
        config_schema:
          key: rate-limit-cli
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 150
        documentation:
          description: Rate limit per second
      - semantic_id: wildcard-tests-cli
        var: WildcardTests
        arg: --wildcard-tests {{.WildcardTests}}
        config_schema:
          key: wildcard-tests-cli
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 50
        documentation:
          description: Number of wildcard detection tests
      - semantic_id: wildcard-batch-cli
        var: WildcardBatch
        arg: --wildcard-batch {{.WildcardBatch}}
        config_schema:
          key: wildcard-batch-cli
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 1000000
        documentation:
          description: Wildcard batch processing size


  subdomain-resolve:
    metadata:
      display_name: Subdomain Resolve
      description: Resolve subdomain list to verify their validity
      stage: resolve
    internal_params:
      resolvers-path-cli: /opt/lunafox/wordlists/resolvers.txt

    base_command: puredns resolve {{quote .InputFile}} -r {{quote .Resolvers}} --write {{quote .OutputFile}} --quiet
    runtime_params:
      - semantic_id: timeout-runtime
        var: Timeout
        config_schema:
          key: timeout-runtime
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 3600
        documentation:
          description: Scan timeout in seconds
    cli_params:
      - semantic_id: threads-cli
        var: Threads
        arg: -t {{.Threads}}
        config_schema:
          key: threads-cli
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 100
        documentation:
          description: Number of concurrent threads
      - semantic_id: rate-limit-cli
        var: RateLimit
        arg: --rate-limit {{.RateLimit}}
        config_schema:
          key: rate-limit-cli
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 150
        documentation:
          description: Rate limit per second

  subdomain-permutation-resolve:
    metadata:
      display_name: Subdomain Permutation Resolve
      description: Generate new possible subdomains by permuting discovered subdomains and resolve them
      stage: permutation
    internal_params:
      resolvers-path-cli: /opt/lunafox/wordlists/resolvers.txt

    base_command: cat {{quote .InputFile}} | dnsgen - | puredns resolve -r {{quote .Resolvers}} --write {{quote .OutputFile}} --quiet
    runtime_params:
      - semantic_id: timeout-runtime
        var: Timeout
        config_schema:
          key: timeout-runtime
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 3600
        documentation:
          description: Scan timeout in seconds
      - semantic_id: wildcard-sample-timeout-runtime
        var: WildcardSampleTimeout
        config_schema:
          key: wildcard-sample-timeout-runtime
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 7200
        documentation:
          description: Wildcard sample timeout in seconds
      - semantic_id: wildcard-sample-multiplier-runtime
        var: WildcardSampleMultiplier
        config_schema:
          key: wildcard-sample-multiplier-runtime
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 100
        documentation:
          description: Wildcard sample size multiplier
      - semantic_id: wildcard-expansion-threshold-runtime
        var: WildcardExpansionThreshold
        config_schema:
          key: wildcard-expansion-threshold-runtime
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 50
        documentation:
          description: Wildcard expansion ratio threshold
    cli_params:
      - semantic_id: threads-cli
        var: Threads
        arg: -t {{.Threads}}
        config_schema:
          key: threads-cli
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 100
        documentation:
          description: Number of concurrent threads
      - semantic_id: rate-limit-cli
        var: RateLimit
        arg: --rate-limit {{.RateLimit}}
        config_schema:
          key: rate-limit-cli
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 150
        documentation:
          description: Rate limit per second
      - semantic_id: wildcard-tests-cli
        var: WildcardTests
        arg: --wildcard-tests {{.WildcardTests}}
        config_schema:
          key: wildcard-tests-cli
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 50
        documentation:
          description: Number of wildcard detection tests
      - semantic_id: wildcard-batch-cli
        var: WildcardBatch
        arg: --wildcard-batch {{.WildcardBatch}}
        config_schema:
          key: wildcard-batch-cli
          type: integer
          required: true
        config_example:
          show_as: value
          comment: true
          value: 1000000
        documentation:
          description: Wildcard batch processing size
