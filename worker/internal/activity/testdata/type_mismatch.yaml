metadata:
  name: "test_workflow"
  version: "1.0.0"
  stages:
    - id: "recon"
      name: "Reconnaissance"
      order: 1

tools:
  subfinder:
    metadata:
      display_name: "Subfinder"
      stage: "recon"
    base_command: "subfinder -d {{.Domain}}"
    cli_params:
      - semantic_id: timeout-cli
        var: Timeout
        arg: "-timeout {{.Timeout}}"
        config_schema:
          key: timeout-cli
          type: "integer"
          required: false
          default: "not-an-int"  # 类型不匹配：应该是 integer
        config_example:
          show_as: value
        documentation:
          description: "Timeout in seconds"
