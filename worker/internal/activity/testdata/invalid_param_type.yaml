metadata:
  name: "test_workflow"
  version: "1.0.0"
  stages:
    - id: "recon"
      name: "Reconnaissance"
      order: 1

tools:
  subfinder:
    metadata:
      display_name: "Subfinder"
      stage: "recon"
    base_command: "subfinder -d {{.Domain}}"
    cli_params:
      - semantic_id: timeout-cli
        var: Timeout
        arg: "-timeout {{.Timeout}}"
        config_schema:
          key: timeout-cli
          type: "invalid_type"  # 无效的类型
          required: false
          default: 3600
        config_example:
          show_as: value
        documentation:
          description: "Timeout in seconds"
