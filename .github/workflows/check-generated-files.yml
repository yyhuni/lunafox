name: Check Generated Files

on:
  workflow_call:

permissions:
  contents: read
  packages: read

jobs:
  check:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    env:
      GOMODCACHE: ${{ github.workspace }}/.cache/go/pkg/mod
      GOCACHE: ${{ github.workspace }}/.cache/go-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: worker/go.mod

      - name: Prepare writable cache directories
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOMODCACHE }}
            ${{ env.GOCACHE }}
          key: ${{ runner.os }}-go-cache-generated-${{ hashFiles('worker/go.sum', 'agent/go.sum', 'server/go.sum', 'contracts/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-cache-generated-

      - name: Install protoc
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Install protoc Go plugins
        run: |
          set -euo pipefail
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.10
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

      - name: Generate runtime gRPC contracts
        run: make proto

      - name: Generate files for all workflows
        working-directory: worker
        run: make generate

      - name: Check for differences
        run: |
          if ! git diff --exit-code; then
            echo "❌ Generated files are out of date!"
            echo "Please run:"
            echo "  make proto"
            echo "  cd worker && make generate"
            echo ""
            echo "Changed files:"
            git status --porcelain
            echo ""
            echo "Diff:"
            git diff
            exit 1
          fi
          echo "✅ Generated files are up to date"

      - name: Run metadata consistency tests
        working-directory: worker
        run: make test-metadata
