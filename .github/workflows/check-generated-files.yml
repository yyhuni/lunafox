name: Check Generated Files

on:
  workflow_call:

permissions:
  contents: read
  packages: read

jobs:
  check:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    env:
      GOMODCACHE: ${{ github.workspace }}/.cache/go/pkg/mod
      GOCACHE: ${{ github.workspace }}/.cache/go-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: worker/go.mod

      - name: Prepare writable cache directories
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOMODCACHE }}
            ${{ env.GOCACHE }}
          key: ${{ runner.os }}-go-cache-worker-${{ hashFiles('worker/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-cache-worker-

      - name: Generate files for all workflows
        working-directory: worker
        run: make generate

      - name: Check for differences
        run: |
          if ! git diff --exit-code; then
            echo "❌ Generated files are out of date!"
            echo "Please run: cd worker && make generate"
            echo ""
            echo "Changed files:"
            git status --porcelain
            echo ""
            echo "Diff:"
            git diff
            exit 1
          fi
          echo "✅ Generated files are up to date"

      - name: Run metadata consistency tests
        working-directory: worker
        run: make test-metadata
