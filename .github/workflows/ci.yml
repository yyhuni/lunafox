name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  check-generated:
    uses: ./.github/workflows/check-generated-files.yml
  
  test:
    uses: ./.github/workflows/test.yml
