name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  detect-changes:
    runs-on: ubuntu-22.04
    outputs:
      run_check_generated: ${{ steps.compute.outputs.run_check_generated }}
      run_frontend_scripts: ${{ steps.compute.outputs.run_frontend_scripts }}
      run_worker: ${{ steps.compute.outputs.run_worker }}
      run_server: ${{ steps.compute.outputs.run_server }}
      run_agent: ${{ steps.compute.outputs.run_agent }}
      run_installer: ${{ steps.compute.outputs.run_installer }}
      run_interface_naming: ${{ steps.compute.outputs.run_interface_naming }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            workflows:
              - '.github/workflows/**'
            check_generated:
              - 'worker/**'
              - 'proto/**'
              - 'contracts/**'
              - 'Makefile'
              - 'scripts/ci/check-runtime-proto-generated.sh'
              - '.github/workflows/check-generated-files.yml'
              - '.github/workflows/ci.yml'
            frontend_scripts:
              - 'frontend/**'
              - 'scripts/**'
              - 'release.manifest.yaml'
              - 'docker/.env.example'
              - 'install.sh'
              - 'start.sh'
              - 'restart.sh'
              - 'stop.sh'
              - 'uninstall.sh'
              - '.github/workflows/test.yml'
              - '.github/workflows/ci.yml'
            worker:
              - 'worker/**'
              - '.github/workflows/test.yml'
              - '.github/workflows/ci.yml'
            server:
              - 'server/**'
              - '.github/workflows/test.yml'
              - '.github/workflows/ci.yml'
            agent:
              - 'agent/**'
              - '.github/workflows/test.yml'
              - '.github/workflows/ci.yml'
            installer:
              - 'tools/installer/**'
              - '.github/workflows/test.yml'
              - '.github/workflows/ci.yml'
            interface_naming:
              - 'server/**'
              - 'worker/**'
              - 'frontend/lib/api-client.ts'
              - 'frontend/lib/response-parser.ts'
              - 'frontend/hooks/_shared/pagination.ts'
              - 'frontend/hooks/_shared/use-stable-pagination-info.ts'
              - 'frontend/hooks/use-notification-sse.ts'
              - 'frontend/hooks/use-targets/queries.ts'
              - 'frontend/hooks/use-endpoints.ts'
              - 'frontend/hooks/use-vulnerabilities/queries.ts'
              - 'frontend/hooks/use-organizations.ts'
              - 'frontend/hooks/_shared/targets-helpers.ts'
              - 'frontend/services/scheduled-scan.service.ts'
              - 'frontend/services/organization.service.ts'
              - 'frontend/services/endpoint.service.ts'
              - 'frontend/types/notification.types.ts'
              - 'frontend/types/command.types.ts'
              - 'frontend/types/endpoint.types.ts'
              - 'frontend/types/tool.types.ts'
              - 'frontend/types/subdomain.types.ts'
              - 'frontend/types/common.types.ts'
              - 'frontend/types/organization.types.ts'
              - 'frontend/types/target.types.ts'
              - 'scripts/ci/check-interface-naming.sh'
              - 'scripts/ci/check-interface-naming-test.sh'
              - 'openspec/changes/refactor-interface-naming-standards/**'
              - 'openspec/changes/refactor-frontend-boundary-naming/**'
              - 'openspec/project.md'
              - 'docs/plans/2026-03-06-interface-naming-*'
              - 'docs/plans/2026-03-06-frontend-boundary-naming*'
              - '.github/workflows/ci.yml'

      - id: compute
        run: |
          set -euo pipefail

          workflows='${{ steps.filter.outputs.workflows }}'
          run_check_generated='${{ steps.filter.outputs.check_generated }}'
          run_frontend_scripts='${{ steps.filter.outputs.frontend_scripts }}'
          run_worker='${{ steps.filter.outputs.worker }}'
          run_server='${{ steps.filter.outputs.server }}'
          run_agent='${{ steps.filter.outputs.agent }}'
          run_installer='${{ steps.filter.outputs.installer }}'
          run_interface_naming='${{ steps.filter.outputs.interface_naming }}'

          if [ "$workflows" = "true" ]; then
            run_check_generated=true
            run_frontend_scripts=true
            run_worker=true
            run_server=true
            run_agent=true
            run_installer=true
            run_interface_naming=true
          fi

          {
            echo "run_check_generated=${run_check_generated}"
            echo "run_frontend_scripts=${run_frontend_scripts}"
            echo "run_worker=${run_worker}"
            echo "run_server=${run_server}"
            echo "run_agent=${run_agent}"
            echo "run_installer=${run_installer}"
            echo "run_interface_naming=${run_interface_naming}"
          } >> "$GITHUB_OUTPUT"

  check-generated:
    needs: detect-changes
    if: needs.detect-changes.outputs.run_check_generated == 'true'
    uses: ./.github/workflows/check-generated-files.yml

  check-interface-naming:
    needs: detect-changes
    if: needs.detect-changes.outputs.run_interface_naming == 'true'
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Check interface naming
        run: bash scripts/ci/check-interface-naming.sh

  test:
    needs: detect-changes
    uses: ./.github/workflows/test.yml
    with:
      run_frontend_scripts: ${{ needs.detect-changes.outputs.run_frontend_scripts == 'true' }}
      run_worker: ${{ needs.detect-changes.outputs.run_worker == 'true' }}
      run_server: ${{ needs.detect-changes.outputs.run_server == 'true' }}
      run_agent: ${{ needs.detect-changes.outputs.run_agent == 'true' }}
      run_installer: ${{ needs.detect-changes.outputs.run_installer == 'true' }}
