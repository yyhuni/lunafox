  merge-staging-images:
    runs-on: ubuntu-22.04
    needs:
      - validate-tag
      - publish-images-amd64
      - publish-images-arm64
      - publish-worker-image-amd64
      - publish-worker-image-arm64
    if: >
      always() &&
      needs.validate-tag.result == 'success' &&
      needs.publish-images-amd64.result == 'success' &&
      needs.publish-images-arm64.result == 'success' &&
      needs.publish-worker-image-amd64.result == 'success' &&
      needs.publish-worker-image-arm64.result == 'success'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate TCR and ACR credentials
        run: |
          set -euo pipefail
          [ -n "${TCR_REGISTRY:-}" ] || { echo "missing TCR_REGISTRY"; exit 1; }
          [ -n "${ACR_REGISTRY:-}" ] || { echo "missing ACR_REGISTRY"; exit 1; }
          [ -n "${{ secrets.TCR_USERNAME }}" ] || { echo "missing TCR_USERNAME"; exit 1; }
          [ -n "${{ secrets.TCR_PASSWORD }}" ] || { echo "missing TCR_PASSWORD"; exit 1; }
          [ -n "${{ secrets.ACR_USERNAME }}" ] || { echo "missing ACR_USERNAME"; exit 1; }
          [ -n "${{ secrets.ACR_PASSWORD }}" ] || { echo "missing ACR_PASSWORD"; exit 1; }

      - name: Log in to Tencent TCR (retry)
        run: |
          set -euo pipefail
          for delay in 0 2 4 8 12; do
            if [ "$delay" -gt 0 ]; then
              sleep "$delay"
            fi
            if printf '%s' "${{ secrets.TCR_PASSWORD }}" | docker login "${TCR_REGISTRY}" --username "${{ secrets.TCR_USERNAME }}" --password-stdin >/dev/null 2>&1; then
              exit 0
            fi
          done
          echo "failed to log in to ${TCR_REGISTRY} after retries" >&2
          exit 1

      - name: Log in to Alibaba ACR (retry)
        run: |
          set -euo pipefail
          for delay in 0 2 4 8 12; do
            if [ "$delay" -gt 0 ]; then
              sleep "$delay"
            fi
            if printf '%s' "${{ secrets.ACR_PASSWORD }}" | docker login "${ACR_REGISTRY}" --username "${{ secrets.ACR_USERNAME }}" --password-stdin >/dev/null 2>&1; then
              exit 0
            fi
          done
          echo "failed to log in to ${ACR_REGISTRY} after retries" >&2
          exit 1

      - name: Merge staging manifests and persist digests
        run: |
          set -euo pipefail
          start_epoch="$(date +%s)"
          mkdir -p dist/image-digests

          retry_imagetools_inspect() {
            local ref="$1"
            local delays=(0 2 4 8 12)
            local delay
            for delay in "${delays[@]}"; do
              if [ "$delay" -gt 0 ]; then
                sleep "$delay"
              fi
              if docker buildx imagetools inspect "$ref" >/dev/null 2>&1; then
                return 0
              fi
            done
            echo "failed to inspect image ref after retries: $ref" >&2
            return 1
          }

          retry_imagetools_create() {
            local target="$1"
            shift
            local delays=(0 2 4)
            local delay
            for delay in "${delays[@]}"; do
              if [ "$delay" -gt 0 ]; then
                sleep "$delay"
              fi
              if docker buildx imagetools create --tag "$target" "$@" >/dev/null 2>&1; then
                return 0
              fi
            done
            echo "failed to create manifest after retries: $target" >&2
            return 1
          }

          resolve_digest() {
            local ref="$1"
            local delays=(0 2 4 8)
            local delay
            local digest
            for delay in "${delays[@]}"; do
              if [ "$delay" -gt 0 ]; then
                sleep "$delay"
              fi
              digest="$(docker buildx imagetools inspect "$ref" | awk '/Digest:/ {print $2; exit}')"
              if [[ "$digest" =~ ^sha256:[a-f0-9]{64}$ ]]; then
                printf '%s\n' "$digest"
                return 0
              fi
            done
            return 1
          }

          images=(
            lunafox-server
            lunafox-frontend
            lunafox-nginx
            lunafox-agent
            lunafox-worker
          )

          for image in "${images[@]}"; do
            docker_amd64_ref="docker.io/${DOCKERHUB_NAMESPACE}/${image}:${RELEASE_STAGING_TAG}-amd64"
            docker_arm64_ref="docker.io/${DOCKERHUB_NAMESPACE}/${image}:${RELEASE_STAGING_TAG}-arm64"
            ghcr_amd64_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${image}:${RELEASE_STAGING_TAG}-amd64"
            ghcr_arm64_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${image}:${RELEASE_STAGING_TAG}-arm64"
            tcr_amd64_ref="${TCR_REGISTRY}/${TCR_NAMESPACE}/${image}:${RELEASE_STAGING_TAG}-amd64"
            tcr_arm64_ref="${TCR_REGISTRY}/${TCR_NAMESPACE}/${image}:${RELEASE_STAGING_TAG}-arm64"
            acr_amd64_ref="${ACR_REGISTRY}/${ACR_NAMESPACE}/${image}:${RELEASE_STAGING_TAG}-amd64"
            acr_arm64_ref="${ACR_REGISTRY}/${ACR_NAMESPACE}/${image}:${RELEASE_STAGING_TAG}-arm64"

            retry_imagetools_inspect "$docker_amd64_ref"
            retry_imagetools_inspect "$docker_arm64_ref"
            retry_imagetools_inspect "$ghcr_amd64_ref"
            retry_imagetools_inspect "$ghcr_arm64_ref"
            retry_imagetools_inspect "$tcr_amd64_ref"
            retry_imagetools_inspect "$tcr_arm64_ref"
            retry_imagetools_inspect "$acr_amd64_ref"
            retry_imagetools_inspect "$acr_arm64_ref"

            docker_staging_ref="docker.io/${DOCKERHUB_NAMESPACE}/${image}:${RELEASE_STAGING_TAG}"
            ghcr_staging_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${image}:${RELEASE_STAGING_TAG}"
            tcr_staging_ref="${TCR_REGISTRY}/${TCR_NAMESPACE}/${image}:${RELEASE_STAGING_TAG}"
            acr_staging_ref="${ACR_REGISTRY}/${ACR_NAMESPACE}/${image}:${RELEASE_STAGING_TAG}"

            retry_imagetools_create "$docker_staging_ref" "$docker_amd64_ref" "$docker_arm64_ref"
            retry_imagetools_create "$ghcr_staging_ref" "$ghcr_amd64_ref" "$ghcr_arm64_ref"
            retry_imagetools_create "$tcr_staging_ref" "$tcr_amd64_ref" "$tcr_arm64_ref"
            retry_imagetools_create "$acr_staging_ref" "$acr_amd64_ref" "$acr_arm64_ref"
            retry_imagetools_inspect "$docker_staging_ref"
            retry_imagetools_inspect "$ghcr_staging_ref"
            retry_imagetools_inspect "$tcr_staging_ref"
            retry_imagetools_inspect "$acr_staging_ref"

            docker_digest="$(resolve_digest "$docker_staging_ref" || true)"
            ghcr_digest="$(resolve_digest "$ghcr_staging_ref" || true)"
            tcr_digest="$(resolve_digest "$tcr_staging_ref" || true)"
            acr_digest="$(resolve_digest "$acr_staging_ref" || true)"
            [[ "$docker_digest" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "invalid docker digest for ${image}: $docker_digest"; exit 1; }
            [[ "$ghcr_digest" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "invalid ghcr digest for ${image}: $ghcr_digest"; exit 1; }
            [[ "$tcr_digest" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "invalid tcr digest for ${image}: $tcr_digest"; exit 1; }
            [[ "$acr_digest" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "invalid acr digest for ${image}: $acr_digest"; exit 1; }

            {
              echo "IMAGE=${image}"
              echo "DIGEST=${docker_digest}"
              echo "STAGING_TAG=${RELEASE_STAGING_TAG}"
              echo "DOCKERHUB_REF=docker.io/${DOCKERHUB_NAMESPACE}/${image}@${docker_digest}"
              echo "GHCR_REF=ghcr.io/${GITHUB_REPOSITORY_OWNER}/${image}@${ghcr_digest}"
              echo "TCR_REF=${TCR_REGISTRY}/${TCR_NAMESPACE}/${image}@${tcr_digest}"
              echo "ACR_REF=${ACR_REGISTRY}/${ACR_NAMESPACE}/${image}@${acr_digest}"
            } > "dist/image-digests/${image}.env"
          done

          end_epoch="$(date +%s)"
          echo "merge_staging_images_duration_seconds=$((end_epoch - start_epoch))"

      - name: Upload image digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-image-digests
          path: dist/image-digests/*.env
          if-no-files-found: error

  update-release-channel:
    runs-on: ubuntu-22.04
    needs: [validate-tag, build-installers, promote-images, finalize-github-release, finalize-gitee-release]
    if: >
      always() &&
      needs.validate-tag.result == 'success' &&
      needs.build-installers.result == 'success' &&
      needs.promote-images.result == 'success' &&
      needs.finalize-github-release.result == 'success' &&
      needs.finalize-gitee-release.result == 'success'
    env:
      GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
      GITEE_REPO: ${{ secrets.GITEE_REPO }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: release-installers
          path: dist/release

      - name: Download image digest artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-image-digests
          path: dist/image-digests

      - name: Generate channel files
        run: |
          set -euo pipefail
          TAG="${{ needs.validate-tag.outputs.tag }}"
          CHANNEL="${{ needs.validate-tag.outputs.channel }}"
          CHANNEL_DIR="$GITHUB_WORKSPACE/dist/channel"
          rm -rf "$CHANNEL_DIR"
          mkdir -p "$CHANNEL_DIR/channels"

          CHECKSUM_FILE="dist/release/checksums.txt"
          linux_amd64_sha="$(awk '$2=="lunafox-installer-linux-amd64"{print $1}' "$CHECKSUM_FILE")"
          linux_arm64_sha="$(awk '$2=="lunafox-installer-linux-arm64"{print $1}' "$CHECKSUM_FILE")"
          darwin_amd64_sha="$(awk '$2=="lunafox-installer-darwin-amd64"{print $1}' "$CHECKSUM_FILE")"
          darwin_arm64_sha="$(awk '$2=="lunafox-installer-darwin-arm64"{print $1}' "$CHECKSUM_FILE")"

          [ -n "$linux_amd64_sha" ] || { echo "missing linux amd64 checksum"; exit 1; }
          [ -n "$linux_arm64_sha" ] || { echo "missing linux arm64 checksum"; exit 1; }
          [ -n "$darwin_amd64_sha" ] || { echo "missing darwin amd64 checksum"; exit 1; }
          [ -n "$darwin_arm64_sha" ] || { echo "missing darwin arm64 checksum"; exit 1; }

          agent_dockerhub_ref="$(awk -F= '$1=="DOCKERHUB_REF"{print $2}' dist/image-digests/lunafox-agent.env | tr -d '\r')"
          agent_ghcr_ref="$(awk -F= '$1=="GHCR_REF"{print $2}' dist/image-digests/lunafox-agent.env | tr -d '\r')"
          agent_tcr_ref="$(awk -F= '$1=="TCR_REF"{print $2}' dist/image-digests/lunafox-agent.env | tr -d '\r')"
          agent_acr_ref="$(awk -F= '$1=="ACR_REF"{print $2}' dist/image-digests/lunafox-agent.env | tr -d '\r')"
          worker_dockerhub_ref="$(awk -F= '$1=="DOCKERHUB_REF"{print $2}' dist/image-digests/lunafox-worker.env | tr -d '\r')"
          worker_ghcr_ref="$(awk -F= '$1=="GHCR_REF"{print $2}' dist/image-digests/lunafox-worker.env | tr -d '\r')"
          worker_tcr_ref="$(awk -F= '$1=="TCR_REF"{print $2}' dist/image-digests/lunafox-worker.env | tr -d '\r')"
          worker_acr_ref="$(awk -F= '$1=="ACR_REF"{print $2}' dist/image-digests/lunafox-worker.env | tr -d '\r')"

          for ref in \
            "$agent_dockerhub_ref" "$agent_ghcr_ref" "$agent_tcr_ref" "$agent_acr_ref" \
            "$worker_dockerhub_ref" "$worker_ghcr_ref" "$worker_tcr_ref" "$worker_acr_ref"; do
            [[ "$ref" =~ ^.+@sha256:[a-f0-9]{64}$ ]] || { echo "invalid digest ref: $ref"; exit 1; }
          done

          cat > "$CHANNEL_DIR/channels/${TAG}.env" <<EOF
          SCHEMA_VERSION=2
          VERSION=${TAG}
          GITHUB_BASE_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}
          GITEE_BASE_URL=https://gitee.com/${GITEE_OWNER}/${GITEE_REPO}/releases/download/${TAG}
          LINUX_AMD64_ASSET=lunafox-installer-linux-amd64
          LINUX_AMD64_SHA256=${linux_amd64_sha}
          LINUX_ARM64_ASSET=lunafox-installer-linux-arm64
          LINUX_ARM64_SHA256=${linux_arm64_sha}
          DARWIN_AMD64_ASSET=lunafox-installer-darwin-amd64
          DARWIN_AMD64_SHA256=${darwin_amd64_sha}
          DARWIN_ARM64_ASSET=lunafox-installer-darwin-arm64
          DARWIN_ARM64_SHA256=${darwin_arm64_sha}
          IMAGE_REGISTRY=docker.io
          IMAGE_NAMESPACE=${DOCKERHUB_NAMESPACE}
          AGENT_IMAGE_REFS=${agent_dockerhub_ref},${agent_ghcr_ref},${agent_tcr_ref},${agent_acr_ref}
          WORKER_IMAGE_REFS=${worker_dockerhub_ref},${worker_ghcr_ref},${worker_tcr_ref},${worker_acr_ref}
          EOF

          if [ "$CHANNEL" = "stable" ]; then
            cp "$CHANNEL_DIR/channels/${TAG}.env" "$CHANNEL_DIR/channels/stable.env"
          elif [ "$CHANNEL" = "canary" ]; then
            cp "$CHANNEL_DIR/channels/${TAG}.env" "$CHANNEL_DIR/channels/canary.env"
          else
            echo "unexpected channel: $CHANNEL" >&2
            exit 1
          fi

          if [ "$CHANNEL" = "stable" ]; then
            ./scripts/installer/verify-channel-schema.sh "$CHANNEL_DIR/channels/${TAG}.env" "$CHANNEL_DIR/channels/stable.env"
          else
            ./scripts/installer/verify-channel-schema.sh "$CHANNEL_DIR/channels/${TAG}.env" "$CHANNEL_DIR/channels/canary.env"
          fi

          echo "CHANNEL_DIR=$CHANNEL_DIR" >> "$GITHUB_ENV"

      - name: Publish release-channel to github and gitee
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "${GITEE_OWNER:-}" ] || { echo "missing GITEE_OWNER"; exit 1; }
          [ -n "${GITEE_REPO:-}" ] || { echo "missing GITEE_REPO"; exit 1; }
          [ -n "${GITEE_TOKEN:-}" ] || { echo "missing GITEE_TOKEN"; exit 1; }

          WORK_DIR="$(mktemp -d)"
          trap 'rm -rf "$WORK_DIR"' EXIT
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git clone --depth 1 --branch "${RELEASE_CHANNEL_BRANCH}" "$REPO_URL" "$WORK_DIR"; then
            :
          else
            git clone --depth 1 "$REPO_URL" "$WORK_DIR"
            (
              cd "$WORK_DIR"
              git checkout --orphan "${RELEASE_CHANNEL_BRANCH}"
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi

          mkdir -p "$WORK_DIR/channels"
          cp "$CHANNEL_DIR/channels/"*.env "$WORK_DIR/channels/"

          (
            cd "$WORK_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add channels/*.env
            if git diff --staged --quiet; then
              echo "release-channel unchanged"
            else
              git commit -m "chore(channel): update ${{ needs.validate-tag.outputs.channel }} to ${{ needs.validate-tag.outputs.tag }}"
              git push origin "${RELEASE_CHANNEL_BRANCH}"
            fi
            git remote add gitee "https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git"
            git push gitee "${RELEASE_CHANNEL_BRANCH}:${RELEASE_CHANNEL_BRANCH}"
          )

  promote-images:
    runs-on: ubuntu-22.04
    needs: [validate-tag, merge-staging-images]
    if: >
      always() &&
      needs.validate-tag.result == 'success' &&
      needs.merge-staging-images.result == 'success'
    steps:
      - name: Download image digest artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-image-digests
          path: dist/image-digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate TCR and ACR credentials
        run: |
          set -euo pipefail
          [ -n "${TCR_REGISTRY:-}" ] || { echo "missing TCR_REGISTRY"; exit 1; }
          [ -n "${ACR_REGISTRY:-}" ] || { echo "missing ACR_REGISTRY"; exit 1; }
          [ -n "${{ secrets.TCR_USERNAME }}" ] || { echo "missing TCR_USERNAME"; exit 1; }
          [ -n "${{ secrets.TCR_PASSWORD }}" ] || { echo "missing TCR_PASSWORD"; exit 1; }
          [ -n "${{ secrets.ACR_USERNAME }}" ] || { echo "missing ACR_USERNAME"; exit 1; }
          [ -n "${{ secrets.ACR_PASSWORD }}" ] || { echo "missing ACR_PASSWORD"; exit 1; }

      - name: Log in to Tencent TCR (retry)
        run: |
          set -euo pipefail
          for delay in 0 2 4 8 12; do
            if [ "$delay" -gt 0 ]; then
              sleep "$delay"
            fi
            if printf '%s' "${{ secrets.TCR_PASSWORD }}" | docker login "${TCR_REGISTRY}" --username "${{ secrets.TCR_USERNAME }}" --password-stdin >/dev/null 2>&1; then
              exit 0
            fi
          done
          echo "failed to log in to ${TCR_REGISTRY} after retries" >&2
          exit 1

      - name: Log in to Alibaba ACR (retry)
        run: |
          set -euo pipefail
          for delay in 0 2 4 8 12; do
            if [ "$delay" -gt 0 ]; then
              sleep "$delay"
            fi
            if printf '%s' "${{ secrets.ACR_PASSWORD }}" | docker login "${ACR_REGISTRY}" --username "${{ secrets.ACR_USERNAME }}" --password-stdin >/dev/null 2>&1; then
              exit 0
            fi
          done
          echo "failed to log in to ${ACR_REGISTRY} after retries" >&2
          exit 1

      - name: Promote staging digest to release tag (phase 2)
        run: |
          set -euo pipefail
          start_epoch="$(date +%s)"
          FINAL_TAG="${{ needs.validate-tag.outputs.tag }}"
          [ -n "$FINAL_TAG" ] || { echo "missing final tag"; exit 1; }
          PLAN_FILE="$(mktemp)"
          trap 'rm -f "$PLAN_FILE"' EXIT

          retry_imagetools_inspect() {
            local ref="$1"
            local delays=(0 2 4 8)
            local delay
            for delay in "${delays[@]}"; do
              if [ "$delay" -gt 0 ]; then
                sleep "$delay"
              fi
              if docker buildx imagetools inspect "$ref" >/dev/null 2>&1; then
                return 0
              fi
            done
            echo "failed to inspect image ref after retries: $ref" >&2
            return 1
          }

          retry_imagetools_create() {
            local target="$1"
            local src="$2"
            local delays=(0 2 4)
            local delay
            for delay in "${delays[@]}"; do
              if [ "$delay" -gt 0 ]; then
                sleep "$delay"
              fi
              if docker buildx imagetools create --tag "$target" "$src" >/dev/null 2>&1; then
                return 0
              fi
            done
            echo "failed to create manifest after retries: $target <- $src" >&2
            return 1
          }

          shopt -s nullglob
          files=(dist/image-digests/*.env)
          [ "${#files[@]}" -gt 0 ] || { echo "missing image digest artifacts"; exit 1; }

          # Preflight all source references first; only promote when all checks pass.
          for file in "${files[@]}"; do
            IMAGE=""
            DIGEST=""
            DOCKERHUB_REF=""
            GHCR_REF=""
            TCR_REF=""
            ACR_REF=""
            # shellcheck disable=SC1090
            source "$file"

            [ -n "$IMAGE" ] || { echo "missing IMAGE in $file"; exit 1; }
            [[ "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "invalid DIGEST in $file: $DIGEST"; exit 1; }
            [ -n "$DOCKERHUB_REF" ] || { echo "missing DOCKERHUB_REF in $file"; exit 1; }
            [ -n "$GHCR_REF" ] || { echo "missing GHCR_REF in $file"; exit 1; }
            [ -n "$TCR_REF" ] || { echo "missing TCR_REF in $file"; exit 1; }
            [ -n "$ACR_REF" ] || { echo "missing ACR_REF in $file"; exit 1; }

            retry_imagetools_inspect "$DOCKERHUB_REF"
            retry_imagetools_inspect "$GHCR_REF"
            retry_imagetools_inspect "$TCR_REF"
            retry_imagetools_inspect "$ACR_REF"

            printf '%s|%s|%s|%s|%s|%s\n' "$IMAGE" "$DIGEST" "$DOCKERHUB_REF" "$GHCR_REF" "$TCR_REF" "$ACR_REF" >> "$PLAN_FILE"
          done

          while IFS='|' read -r IMAGE DIGEST DOCKERHUB_REF GHCR_REF TCR_REF ACR_REF; do
            docker_target="docker.io/${DOCKERHUB_NAMESPACE}/${IMAGE}:${FINAL_TAG}"
            ghcr_target="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${IMAGE}:${FINAL_TAG}"
            tcr_target="${TCR_REGISTRY}/${TCR_NAMESPACE}/${IMAGE}:${FINAL_TAG}"
            acr_target="${ACR_REGISTRY}/${ACR_NAMESPACE}/${IMAGE}:${FINAL_TAG}"

            echo "promote ${IMAGE}: ${DIGEST}"
            retry_imagetools_create "$docker_target" "$DOCKERHUB_REF"
            retry_imagetools_create "$ghcr_target" "$GHCR_REF"
            retry_imagetools_create "$tcr_target" "$TCR_REF"
            retry_imagetools_create "$acr_target" "$ACR_REF"
            retry_imagetools_inspect "$docker_target"
            retry_imagetools_inspect "$ghcr_target"
            retry_imagetools_inspect "$tcr_target"
            retry_imagetools_inspect "$acr_target"
          done < "$PLAN_FILE"

          end_epoch="$(date +%s)"
          echo "promote_images_duration_seconds=$((end_epoch - start_epoch))"

