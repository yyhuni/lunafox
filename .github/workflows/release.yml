name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  RELEASE_CHANNEL_BRANCH: release-channel
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE != '' && vars.DOCKERHUB_NAMESPACE || 'yyhuni' }}
  TCR_REGISTRY: ${{ vars.TCR_REGISTRY != '' && vars.TCR_REGISTRY || 'ccr.ccs.tencentyun.com' }}
  TCR_NAMESPACE: ${{ vars.TCR_NAMESPACE != '' && vars.TCR_NAMESPACE || 'yyhuni' }}

jobs:
  validate-tag:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      channel: ${{ steps.validate.outputs.channel }}
      prerelease: ${{ steps.validate.outputs.prerelease }}
    steps:
      - id: validate
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          CHANNEL=""
          PRERELEASE="false"

          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHANNEL="stable"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(rc|beta|alpha|test)\.[0-9]+$ ]]; then
            CHANNEL="canary"
            PRERELEASE="true"
          else
            echo "Tag must be vX.Y.Z or vX.Y.Z-(rc|beta|alpha|test).N, got: $TAG" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  build-installers:
    runs-on: ubuntu-22.04
    needs: validate-tag
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false

      - name: Build installer binaries
        working-directory: tools/installer
        run: |
          set -euo pipefail
          TAG="${{ needs.validate-tag.outputs.tag }}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          OUT_DIR="$GITHUB_WORKSPACE/dist/release"
          mkdir -p "$OUT_DIR"

          build_one() {
            local goos="$1"
            local goarch="$2"
            local out="$3"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath \
                -ldflags "-s -w \
                -X 'github.com/yyhuni/lunafox/tools/installer/internal/buildinfo.Version=${TAG}' \
                -X 'github.com/yyhuni/lunafox/tools/installer/internal/buildinfo.Commit=${GITHUB_SHA}' \
                -X 'github.com/yyhuni/lunafox/tools/installer/internal/buildinfo.BuildTime=${BUILD_TIME}'" \
                -o "$out" \
                ./cmd/lunafox-installer
            chmod +x "$out"
          }

          build_one "linux" "amd64" "$OUT_DIR/lunafox-installer-linux-amd64"
          build_one "linux" "arm64" "$OUT_DIR/lunafox-installer-linux-arm64"
          build_one "darwin" "amd64" "$OUT_DIR/lunafox-installer-darwin-amd64"
          build_one "darwin" "arm64" "$OUT_DIR/lunafox-installer-darwin-arm64"

          (cd "$OUT_DIR" && sha256sum lunafox-installer-* > checksums.txt)
          ls -lah "$OUT_DIR"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-installers
          path: dist/release/*
          if-no-files-found: error

  publish-github-release:
    runs-on: ubuntu-22.04
    needs: [validate-tag, build-installers]
    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: release-installers
          path: dist/release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          name: ${{ needs.validate-tag.outputs.tag }}
          prerelease: ${{ needs.validate-tag.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/release/lunafox-installer-linux-amd64
            dist/release/lunafox-installer-linux-arm64
            dist/release/lunafox-installer-darwin-amd64
            dist/release/lunafox-installer-darwin-arm64
            dist/release/checksums.txt
          fail_on_unmatched_files: true
          overwrite_files: true

  publish-gitee-release:
    runs-on: ubuntu-22.04
    needs: [validate-tag, build-installers]
    env:
      GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
      GITEE_REPO: ${{ secrets.GITEE_REPO }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: release-installers
          path: dist/release

      - name: Validate gitee secrets
        run: |
          set -euo pipefail
          [ -n "${GITEE_OWNER:-}" ] || { echo "missing GITEE_OWNER"; exit 1; }
          [ -n "${GITEE_REPO:-}" ] || { echo "missing GITEE_REPO"; exit 1; }
          [ -n "${GITEE_TOKEN:-}" ] || { echo "missing GITEE_TOKEN"; exit 1; }

      - name: Push tag to gitee
        run: |
          set -euo pipefail
          TAG="${{ needs.validate-tag.outputs.tag }}"
          git remote add gitee "https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git"
          git push gitee "refs/tags/${TAG}:refs/tags/${TAG}"

      - name: Publish gitee release
        run: |
          set -euo pipefail
          TAG="${{ needs.validate-tag.outputs.tag }}"
          PRERELEASE="${{ needs.validate-tag.outputs.prerelease }}"
          API="https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          PAYLOAD=$(cat <<JSON
          {"tag_name":"${TAG}","name":"${TAG}","body":"Automated release for ${TAG}","prerelease":${PRERELEASE}}
          JSON
          )

          extract_release_id() {
            python3 - "$1" <<'PY'
import json
import sys

path = sys.argv[1]
try:
    with open(path, "r", encoding="utf-8") as f:
        payload = json.load(f)
except Exception:
    print("")
    sys.exit(0)

if isinstance(payload, dict):
    release_id = payload.get("id")
    if release_id is not None:
        print(release_id)
        sys.exit(0)

print("")
PY
          }

          STATUS=$(curl -sS -o "$TMP_DIR/create.json" -w "%{http_code}" \
            -X POST "${API}/releases?access_token=${GITEE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          RELEASE_ID=""
          LOOKUP_STATUS=""
          COMPAT_STATUS=""

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            RELEASE_ID="$(extract_release_id "$TMP_DIR/create.json")"
          fi

          # Compatibility fallback: some gitee instances may reject or ignore
          # prerelease fields. Retry create with a minimal payload.
          if [ -z "$RELEASE_ID" ] && [ "$PRERELEASE" = "true" ]; then
            COMPAT_PAYLOAD=$(cat <<JSON
          {"tag_name":"${TAG}","name":"${TAG}","body":"Automated release for ${TAG}"}
          JSON
            )
            COMPAT_STATUS=$(curl -sS -o "$TMP_DIR/create-compat.json" -w "%{http_code}" \
              -X POST "${API}/releases?access_token=${GITEE_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$COMPAT_PAYLOAD")
            if [ "$COMPAT_STATUS" -ge 200 ] && [ "$COMPAT_STATUS" -lt 300 ]; then
              RELEASE_ID="$(extract_release_id "$TMP_DIR/create-compat.json")"
            fi
          fi

          if [ -z "$RELEASE_ID" ]; then
            for delay in 0 2 4 6; do
              if [ "$delay" -gt 0 ]; then
                sleep "$delay"
              fi
              LOOKUP_STATUS=$(curl -sS -o "$TMP_DIR/release.json" -w "%{http_code}" \
                "${API}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")
              if [ "$LOOKUP_STATUS" -ge 200 ] && [ "$LOOKUP_STATUS" -lt 300 ]; then
                RELEASE_ID="$(extract_release_id "$TMP_DIR/release.json")"
                if [ -n "$RELEASE_ID" ]; then
                  break
                fi
              fi
            done
          fi

          if [ -z "$RELEASE_ID" ]; then
            echo "failed to resolve gitee release id for tag ${TAG}" >&2
            echo "create status: ${STATUS}" >&2
            if [ -n "${COMPAT_STATUS}" ]; then
              echo "compat create status: ${COMPAT_STATUS}" >&2
            fi
            if [ -n "${LOOKUP_STATUS}" ]; then
              echo "lookup status: ${LOOKUP_STATUS}" >&2
            fi
            echo "create response:" >&2
            cat "$TMP_DIR/create.json" >&2 || true
            if [ -f "$TMP_DIR/create-compat.json" ]; then
              echo "compat create response:" >&2
              cat "$TMP_DIR/create-compat.json" >&2 || true
            fi
            if [ -f "$TMP_DIR/release.json" ]; then
              echo "lookup response:" >&2
              cat "$TMP_DIR/release.json" >&2 || true
            fi
            exit 1
          fi

          for file in dist/release/lunafox-installer-* dist/release/checksums.txt; do
            name="$(basename "$file")"
            curl -fsSL \
              -X POST "${API}/releases/${RELEASE_ID}/attach_files?access_token=${GITEE_TOKEN}" \
              -F "name=${name}" \
              -F "file=@${file}" >/dev/null
          done

  publish-images:
    runs-on: ubuntu-22.04
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: lunafox-server
            context: ./server
            dockerfile: ./server/Dockerfile
          - image: lunafox-frontend
            context: .
            dockerfile: ./frontend/Dockerfile
          - image: lunafox-nginx
            context: .
            dockerfile: ./docker/nginx/Dockerfile
          - image: lunafox-worker
            context: ./worker
            dockerfile: ./worker/Dockerfile
          - image: lunafox-agent
            context: .
            dockerfile: ./agent/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Tencent TCR credentials
        run: |
          set -euo pipefail
          [ -n "${{ secrets.TCR_USERNAME }}" ] || { echo "missing TCR_USERNAME"; exit 1; }
          [ -n "${{ secrets.TCR_PASSWORD }}" ] || { echo "missing TCR_PASSWORD"; exit 1; }

      - name: Log in to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:${{ needs.validate-tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ needs.validate-tag.outputs.tag }}
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ matrix.image }}:${{ needs.validate-tag.outputs.tag }}

      - name: Persist image digest
        run: |
          set -euo pipefail
          DIGEST="${{ steps.build_push.outputs.digest }}"
          [ -n "$DIGEST" ] || { echo "missing digest for ${{ matrix.image }}"; exit 1; }
          mkdir -p dist/image-digests
          cat > "dist/image-digests/${{ matrix.image }}.env" <<EOF
          IMAGE=${{ matrix.image }}
          DIGEST=${DIGEST}
          DOCKERHUB_REF=docker.io/${DOCKERHUB_NAMESPACE}/${{ matrix.image }}@${DIGEST}
          GHCR_REF=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@${DIGEST}
          TCR_REF=${TCR_REGISTRY}/${TCR_NAMESPACE}/${{ matrix.image }}@${DIGEST}
          EOF

      - name: Upload image digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ matrix.image }}
          path: dist/image-digests/${{ matrix.image }}.env
          if-no-files-found: error

  update-release-channel:
    runs-on: ubuntu-22.04
    needs: [validate-tag, build-installers, publish-github-release, publish-gitee-release, publish-images]
    env:
      GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
      GITEE_REPO: ${{ secrets.GITEE_REPO }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: release-installers
          path: dist/release

      - name: Download image digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: image-digest-*
          merge-multiple: true
          path: dist/image-digests

      - name: Generate channel files
        run: |
          set -euo pipefail
          TAG="${{ needs.validate-tag.outputs.tag }}"
          CHANNEL="${{ needs.validate-tag.outputs.channel }}"
          CHANNEL_DIR="$GITHUB_WORKSPACE/dist/channel"
          rm -rf "$CHANNEL_DIR"
          mkdir -p "$CHANNEL_DIR/channels"

          CHECKSUM_FILE="dist/release/checksums.txt"
          linux_amd64_sha="$(awk '$2=="lunafox-installer-linux-amd64"{print $1}' "$CHECKSUM_FILE")"
          linux_arm64_sha="$(awk '$2=="lunafox-installer-linux-arm64"{print $1}' "$CHECKSUM_FILE")"
          darwin_amd64_sha="$(awk '$2=="lunafox-installer-darwin-amd64"{print $1}' "$CHECKSUM_FILE")"
          darwin_arm64_sha="$(awk '$2=="lunafox-installer-darwin-arm64"{print $1}' "$CHECKSUM_FILE")"

          [ -n "$linux_amd64_sha" ] || { echo "missing linux amd64 checksum"; exit 1; }
          [ -n "$linux_arm64_sha" ] || { echo "missing linux arm64 checksum"; exit 1; }
          [ -n "$darwin_amd64_sha" ] || { echo "missing darwin amd64 checksum"; exit 1; }
          [ -n "$darwin_arm64_sha" ] || { echo "missing darwin arm64 checksum"; exit 1; }

          agent_digest="$(awk -F= '$1=="DIGEST"{print $2}' dist/image-digests/lunafox-agent.env | tr -d '\r')"
          worker_digest="$(awk -F= '$1=="DIGEST"{print $2}' dist/image-digests/lunafox-worker.env | tr -d '\r')"
          [[ "$agent_digest" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "invalid agent digest: $agent_digest"; exit 1; }
          [[ "$worker_digest" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "invalid worker digest: $worker_digest"; exit 1; }
          agent_tcr_ref="${TCR_REGISTRY}/${TCR_NAMESPACE}/lunafox-agent@${agent_digest}"
          agent_dockerhub_ref="docker.io/${DOCKERHUB_NAMESPACE}/lunafox-agent@${agent_digest}"
          agent_ghcr_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/lunafox-agent@${agent_digest}"
          worker_tcr_ref="${TCR_REGISTRY}/${TCR_NAMESPACE}/lunafox-worker@${worker_digest}"
          worker_dockerhub_ref="docker.io/${DOCKERHUB_NAMESPACE}/lunafox-worker@${worker_digest}"
          worker_ghcr_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/lunafox-worker@${worker_digest}"

          cat > "$CHANNEL_DIR/channels/${TAG}.env" <<EOF
          SCHEMA_VERSION=2
          VERSION=${TAG}
          GITHUB_BASE_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}
          GITEE_BASE_URL=https://gitee.com/${GITEE_OWNER}/${GITEE_REPO}/releases/download/${TAG}
          LINUX_AMD64_ASSET=lunafox-installer-linux-amd64
          LINUX_AMD64_SHA256=${linux_amd64_sha}
          LINUX_ARM64_ASSET=lunafox-installer-linux-arm64
          LINUX_ARM64_SHA256=${linux_arm64_sha}
          DARWIN_AMD64_ASSET=lunafox-installer-darwin-amd64
          DARWIN_AMD64_SHA256=${darwin_amd64_sha}
          DARWIN_ARM64_ASSET=lunafox-installer-darwin-arm64
          DARWIN_ARM64_SHA256=${darwin_arm64_sha}
          IMAGE_REGISTRY=docker.io
          IMAGE_NAMESPACE=${DOCKERHUB_NAMESPACE}
          AGENT_IMAGE_REFS=${agent_dockerhub_ref},${agent_ghcr_ref},${agent_tcr_ref}
          WORKER_IMAGE_REFS=${worker_dockerhub_ref},${worker_ghcr_ref},${worker_tcr_ref}
          EOF

          if [ "$CHANNEL" = "stable" ]; then
            cp "$CHANNEL_DIR/channels/${TAG}.env" "$CHANNEL_DIR/channels/stable.env"
          elif [ "$CHANNEL" = "canary" ]; then
            cp "$CHANNEL_DIR/channels/${TAG}.env" "$CHANNEL_DIR/channels/canary.env"
          else
            echo "unexpected channel: $CHANNEL" >&2
            exit 1
          fi

          if [ "$CHANNEL" = "stable" ]; then
            ./scripts/installer/verify-channel-schema.sh "$CHANNEL_DIR/channels/${TAG}.env" "$CHANNEL_DIR/channels/stable.env"
          else
            ./scripts/installer/verify-channel-schema.sh "$CHANNEL_DIR/channels/${TAG}.env" "$CHANNEL_DIR/channels/canary.env"
          fi

          echo "CHANNEL_DIR=$CHANNEL_DIR" >> "$GITHUB_ENV"

      - name: Publish release-channel to github and gitee
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "${GITEE_OWNER:-}" ] || { echo "missing GITEE_OWNER"; exit 1; }
          [ -n "${GITEE_REPO:-}" ] || { echo "missing GITEE_REPO"; exit 1; }
          [ -n "${GITEE_TOKEN:-}" ] || { echo "missing GITEE_TOKEN"; exit 1; }

          WORK_DIR="$(mktemp -d)"
          trap 'rm -rf "$WORK_DIR"' EXIT
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git clone --depth 1 --branch "${RELEASE_CHANNEL_BRANCH}" "$REPO_URL" "$WORK_DIR"; then
            :
          else
            git clone --depth 1 "$REPO_URL" "$WORK_DIR"
            (
              cd "$WORK_DIR"
              git checkout --orphan "${RELEASE_CHANNEL_BRANCH}"
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi

          mkdir -p "$WORK_DIR/channels"
          cp "$CHANNEL_DIR/channels/"*.env "$WORK_DIR/channels/"

          (
            cd "$WORK_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add channels/*.env
            if git diff --staged --quiet; then
              echo "release-channel unchanged"
            else
              git commit -m "chore(channel): update ${{ needs.validate-tag.outputs.channel }} to ${{ needs.validate-tag.outputs.tag }}"
              git push origin "${RELEASE_CHANNEL_BRANCH}"
            fi
            git remote add gitee "https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git"
            git push gitee "${RELEASE_CHANNEL_BRANCH}:${RELEASE_CHANNEL_BRANCH}"
          )
