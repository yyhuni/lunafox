name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-global
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  RELEASE_CHANNEL_BRANCH: release-channel
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE != '' && vars.DOCKERHUB_NAMESPACE || 'yyhuni' }}
  TCR_REGISTRY: ${{ vars.TCR_REGISTRY != '' && vars.TCR_REGISTRY || 'ccr.ccs.tencentyun.com' }}
  TCR_NAMESPACE: ${{ vars.TCR_NAMESPACE != '' && vars.TCR_NAMESPACE || 'yyhuni' }}
  ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE != '' && vars.ACR_NAMESPACE || 'yyhuni' }}
  RELEASE_STAGING_TAG: ci-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  validate-tag:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      channel: ${{ steps.validate.outputs.channel }}
      prerelease: ${{ steps.validate.outputs.prerelease }}
    steps:
      - id: validate
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          CHANNEL=""
          PRERELEASE="false"

          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHANNEL="stable"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(rc|beta|alpha)\.[0-9]+$ ]]; then
            CHANNEL="canary"
            PRERELEASE="true"
          else
            echo "Tag must be vX.Y.Z or vX.Y.Z-(rc|beta|alpha).N, got: $TAG" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  build-installers:
    runs-on: ubuntu-22.04
    needs: validate-tag
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false

      - name: Build installer binaries
        working-directory: tools/installer
        run: |
          set -euo pipefail
          TAG="${{ needs.validate-tag.outputs.tag }}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          OUT_DIR="$GITHUB_WORKSPACE/dist/release"
          mkdir -p "$OUT_DIR"

          build_one() {
            local goos="$1"
            local goarch="$2"
            local out="$3"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath \
                -ldflags "-s -w \
                -X 'github.com/yyhuni/lunafox/tools/installer/internal/buildinfo.Version=${TAG}' \
                -X 'github.com/yyhuni/lunafox/tools/installer/internal/buildinfo.Commit=${GITHUB_SHA}' \
                -X 'github.com/yyhuni/lunafox/tools/installer/internal/buildinfo.BuildTime=${BUILD_TIME}'" \
                -o "$out" \
                ./cmd/lunafox-installer
            chmod +x "$out"
          }

          build_one "linux" "amd64" "$OUT_DIR/lunafox-installer-linux-amd64"
          build_one "linux" "arm64" "$OUT_DIR/lunafox-installer-linux-arm64"
          build_one "darwin" "amd64" "$OUT_DIR/lunafox-installer-darwin-amd64"
          build_one "darwin" "arm64" "$OUT_DIR/lunafox-installer-darwin-arm64"

          (cd "$OUT_DIR" && sha256sum lunafox-installer-* > checksums.txt)
          ls -lah "$OUT_DIR"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-installers
          path: dist/release/*
          if-no-files-found: error

  prepare-github-release:
    runs-on: ubuntu-22.04
    needs: [validate-tag, build-installers]
    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: release-installers
          path: dist/release

      - name: Prepare GitHub draft release (phase 1)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          name: ${{ needs.validate-tag.outputs.tag }}
          draft: true
          prerelease: ${{ needs.validate-tag.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/release/lunafox-installer-linux-amd64
            dist/release/lunafox-installer-linux-arm64
            dist/release/lunafox-installer-darwin-amd64
            dist/release/lunafox-installer-darwin-arm64
            dist/release/checksums.txt
          fail_on_unmatched_files: true
          overwrite_files: true

  prepare-gitee-release:
    runs-on: ubuntu-22.04
    needs: validate-tag
    env:
      GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
      GITEE_REPO: ${{ secrets.GITEE_REPO }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate gitee secrets
        run: |
          set -euo pipefail
          [ -n "${GITEE_OWNER:-}" ] || { echo "missing GITEE_OWNER"; exit 1; }
          [ -n "${GITEE_REPO:-}" ] || { echo "missing GITEE_REPO"; exit 1; }
          [ -n "${GITEE_TOKEN:-}" ] || { echo "missing GITEE_TOKEN"; exit 1; }

      - name: Push tag to gitee
        run: |
          set -euo pipefail
          TAG="${{ needs.validate-tag.outputs.tag }}"
          git remote add gitee "https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git"
          local_oid="$(git rev-parse "refs/tags/${TAG}^{commit}")"
          remote_line="$(git ls-remote --tags gitee "refs/tags/${TAG}" || true)"
          remote_oid="$(printf '%s' "$remote_line" | awk 'NR==1{print $1}')"

          if [ -n "${remote_oid}" ]; then
            if [ "$remote_oid" = "$local_oid" ]; then
              echo "gitee tag ${TAG} already exists with same commit, skip push"
              exit 0
            fi
            echo "gitee tag ${TAG} already exists but points to different commit: remote=${remote_oid}, local=${local_oid}" >&2
            exit 1
          fi

          git push gitee "refs/tags/${TAG}:refs/tags/${TAG}"

  publish-worker-tools-meta:
    runs-on: ubuntu-22.04
    needs: validate-tag
    outputs:
      tools_tag: ${{ steps.meta.outputs.tools_tag }}
      exists: ${{ steps.probe.outputs.exists }}
      source_ref: ${{ steps.probe.outputs.source_ref }}
      source_registry: ${{ steps.probe.outputs.source_registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute worker tools tag
        id: meta
        run: |
          set -euo pipefail
          TOOLS_HASH="$(sha256sum worker/Dockerfile.tools | awk '{print substr($1,1,16)}')"
          TOOLS_TAG="tools-${TOOLS_HASH}"
          echo "tools_tag=${TOOLS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Probe reusable worker-tools image
        id: probe
        run: |
          set -euo pipefail
          GHCR_REF="ghcr.io/${GITHUB_REPOSITORY_OWNER}/lunafox-worker-tools:${{ steps.meta.outputs.tools_tag }}"
          DOCKER_REF="docker.io/${DOCKERHUB_NAMESPACE}/lunafox-worker-tools:${{ steps.meta.outputs.tools_tag }}"

          if docker buildx imagetools inspect "$GHCR_REF" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "source_registry=ghcr" >> "$GITHUB_OUTPUT"
            echo "source_ref=$GHCR_REF" >> "$GITHUB_OUTPUT"
          elif docker buildx imagetools inspect "$DOCKER_REF" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "source_registry=dockerhub" >> "$GITHUB_OUTPUT"
            echo "source_ref=$DOCKER_REF" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "source_registry=none" >> "$GITHUB_OUTPUT"
            echo "source_ref=" >> "$GITHUB_OUTPUT"
          fi

  publish-worker-tools-amd64:
    runs-on: ubuntu-22.04
    needs: [validate-tag, publish-worker-tools-meta]
    if: needs.publish-worker-tools-meta.outputs.exists != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate TCR and ACR credentials
        run: |
          set -euo pipefail
          [ -n "${TCR_REGISTRY:-}" ] || { echo "missing TCR_REGISTRY"; exit 1; }
          [ -n "${ACR_REGISTRY:-}" ] || { echo "missing ACR_REGISTRY"; exit 1; }
          [ -n "${{ secrets.TCR_USERNAME }}" ] || { echo "missing TCR_USERNAME"; exit 1; }
          [ -n "${{ secrets.TCR_PASSWORD }}" ] || { echo "missing TCR_PASSWORD"; exit 1; }
          [ -n "${{ secrets.ACR_USERNAME }}" ] || { echo "missing ACR_USERNAME"; exit 1; }
          [ -n "${{ secrets.ACR_PASSWORD }}" ] || { echo "missing ACR_PASSWORD"; exit 1; }

      - name: Log in to Tencent TCR (retry)
        run: |
          set -euo pipefail
          for delay in 0 2 4 8 12; do
            if [ "$delay" -gt 0 ]; then
              sleep "$delay"
            fi
            if printf '%s' "${{ secrets.TCR_PASSWORD }}" | docker login "${TCR_REGISTRY}" --username "${{ secrets.TCR_USERNAME }}" --password-stdin >/dev/null 2>&1; then
              exit 0
            fi
          done
          echo "failed to log in to ${TCR_REGISTRY} after retries" >&2
          exit 1

      - name: Log in to Alibaba ACR (retry)
        run: |
          set -euo pipefail
          for delay in 0 2 4 8 12; do
            if [ "$delay" -gt 0 ]; then
              sleep "$delay"
            fi
            if printf '%s' "${{ secrets.ACR_PASSWORD }}" | docker login "${ACR_REGISTRY}" --username "${{ secrets.ACR_USERNAME }}" --password-stdin >/dev/null 2>&1; then
              exit 0
            fi
          done
          echo "failed to log in to ${ACR_REGISTRY} after retries" >&2
          exit 1

      - name: Build and push worker tools image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile.tools
          target: tools-export
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: |
            GOPROXY=${{ vars.GOPROXY != '' && vars.GOPROXY || 'https://proxy.golang.org,direct' }}
            GOFLAGS=${{ vars.WORKER_TOOLS_GOFLAGS != '' && vars.WORKER_TOOLS_GOFLAGS || '-p=4' }}
            GOMAXPROCS=${{ vars.WORKER_TOOLS_GOMAXPROCS != '' && vars.WORKER_TOOLS_GOMAXPROCS || '4' }}
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker-tools:${{ needs.publish-worker-tools-meta.outputs.tools_tag }}-amd64
            ghcr.io/${{ github.repository_owner }}/lunafox-worker-tools:${{ needs.publish-worker-tools-meta.outputs.tools_tag }}-amd64
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/lunafox-worker-tools:${{ needs.publish-worker-tools-meta.outputs.tools_tag }}-amd64
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/lunafox-worker-tools:${{ needs.publish-worker-tools-meta.outputs.tools_tag }}-amd64
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/lunafox-worker-tools:buildcache-amd64
          cache-to: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/lunafox-worker-tools:buildcache-amd64,mode=max

  publish-worker-tools-arm64:
    runs-on: ubuntu-22.04-arm
    needs: [validate-tag, publish-worker-tools-meta]
    if: needs.publish-worker-tools-meta.outputs.exists != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate TCR and ACR credentials
        run: |
          set -euo pipefail
          [ -n "${TCR_REGISTRY:-}" ] || { echo "missing TCR_REGISTRY"; exit 1; }
          [ -n "${ACR_REGISTRY:-}" ] || { echo "missing ACR_REGISTRY"; exit 1; }
          [ -n "${{ secrets.TCR_USERNAME }}" ] || { echo "missing TCR_USERNAME"; exit 1; }
          [ -n "${{ secrets.TCR_PASSWORD }}" ] || { echo "missing TCR_PASSWORD"; exit 1; }
          [ -n "${{ secrets.ACR_USERNAME }}" ] || { echo "missing ACR_USERNAME"; exit 1; }
          [ -n "${{ secrets.ACR_PASSWORD }}" ] || { echo "missing ACR_PASSWORD"; exit 1; }

      - name: Log in to Tencent TCR (retry)
        run: |
          set -euo pipefail
          for delay in 0 2 4 8 12; do
            if [ "$delay" -gt 0 ]; then
              sleep "$delay"
            fi
            if printf '%s' "${{ secrets.TCR_PASSWORD }}" | docker login "${TCR_REGISTRY}" --username "${{ secrets.TCR_USERNAME }}" --password-stdin >/dev/null 2>&1; then
              exit 0
            fi
          done
          echo "failed to log in to ${TCR_REGISTRY} after retries" >&2
          exit 1

      - name: Log in to Alibaba ACR (retry)
        run: |
          set -euo pipefail
          for delay in 0 2 4 8 12; do
            if [ "$delay" -gt 0 ]; then
              sleep "$delay"
            fi
            if printf '%s' "${{ secrets.ACR_PASSWORD }}" | docker login "${ACR_REGISTRY}" --username "${{ secrets.ACR_USERNAME }}" --password-stdin >/dev/null 2>&1; then
              exit 0
            fi
          done
          echo "failed to log in to ${ACR_REGISTRY} after retries" >&2
          exit 1

      - name: Build and push worker tools image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile.tools
          target: tools-export
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          build-args: |
            GOPROXY=${{ vars.GOPROXY != '' && vars.GOPROXY || 'https://proxy.golang.org,direct' }}
            GOFLAGS=${{ vars.WORKER_TOOLS_GOFLAGS != '' && vars.WORKER_TOOLS_GOFLAGS || '-p=4' }}
            GOMAXPROCS=${{ vars.WORKER_TOOLS_GOMAXPROCS != '' && vars.WORKER_TOOLS_GOMAXPROCS || '4' }}
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker-tools:${{ needs.publish-worker-tools-meta.outputs.tools_tag }}-arm64
            ghcr.io/${{ github.repository_owner }}/lunafox-worker-tools:${{ needs.publish-worker-tools-meta.outputs.tools_tag }}-arm64
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/lunafox-worker-tools:${{ needs.publish-worker-tools-meta.outputs.tools_tag }}-arm64
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/lunafox-worker-tools:${{ needs.publish-worker-tools-meta.outputs.tools_tag }}-arm64
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/lunafox-worker-tools:buildcache-arm64
          cache-to: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/lunafox-worker-tools:buildcache-arm64,mode=max

  publish-worker-tools:
    runs-on: ubuntu-22.04
    needs: [publish-worker-tools-meta, publish-worker-tools-amd64, publish-worker-tools-arm64]
    if: >
      always() &&
      needs.publish-worker-tools-meta.result == 'success' &&
      (
        needs.publish-worker-tools-meta.outputs.exists == 'true' ||
        (needs.publish-worker-tools-amd64.result == 'success' && needs.publish-worker-tools-arm64.result == 'success')
      )
    outputs:
      tools_tag: ${{ needs.publish-worker-tools-meta.outputs.tools_tag }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate TCR and ACR credentials
        run: |
          set -euo pipefail
          [ -n "${TCR_REGISTRY:-}" ] || { echo "missing TCR_REGISTRY"; exit 1; }
          [ -n "${ACR_REGISTRY:-}" ] || { echo "missing ACR_REGISTRY"; exit 1; }
          [ -n "${{ secrets.TCR_USERNAME }}" ] || { echo "missing TCR_USERNAME"; exit 1; }
          [ -n "${{ secrets.TCR_PASSWORD }}" ] || { echo "missing TCR_PASSWORD"; exit 1; }
          [ -n "${{ secrets.ACR_USERNAME }}" ] || { echo "missing ACR_USERNAME"; exit 1; }
          [ -n "${{ secrets.ACR_PASSWORD }}" ] || { echo "missing ACR_PASSWORD"; exit 1; }

      - name: Log in to Tencent TCR (retry)
        run: |
          set -euo pipefail
          for delay in 0 2 4 8 12; do
            if [ "$delay" -gt 0 ]; then
              sleep "$delay"
            fi
            if printf '%s' "${{ secrets.TCR_PASSWORD }}" | docker login "${TCR_REGISTRY}" --username "${{ secrets.TCR_USERNAME }}" --password-stdin >/dev/null 2>&1; then
              exit 0
            fi
          done
          echo "failed to log in to ${TCR_REGISTRY} after retries" >&2
          exit 1

      - name: Log in to Alibaba ACR (retry)
        run: |
          set -euo pipefail
          for delay in 0 2 4 8 12; do
            if [ "$delay" -gt 0 ]; then
              sleep "$delay"
            fi
            if printf '%s' "${{ secrets.ACR_PASSWORD }}" | docker login "${ACR_REGISTRY}" --username "${{ secrets.ACR_USERNAME }}" --password-stdin >/dev/null 2>&1; then
              exit 0
            fi
          done
          echo "failed to log in to ${ACR_REGISTRY} after retries" >&2
          exit 1

      - name: Publish worker-tools multi-arch tag
        run: |
          set -euo pipefail
          TOOLS_TAG="${{ needs.publish-worker-tools-meta.outputs.tools_tag }}"
          EXISTS="${{ needs.publish-worker-tools-meta.outputs.exists }}"
          SOURCE_REGISTRY="${{ needs.publish-worker-tools-meta.outputs.source_registry }}"
          SOURCE_REF="${{ needs.publish-worker-tools-meta.outputs.source_ref }}"
          [ -n "$TOOLS_TAG" ] || { echo "missing tools tag"; exit 1; }

          if [ "$EXISTS" = "true" ]; then
            GHCR_TARGET="ghcr.io/${GITHUB_REPOSITORY_OWNER}/lunafox-worker-tools:${TOOLS_TAG}"
            TCR_TARGET="${TCR_REGISTRY}/${TCR_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}"
            ACR_TARGET="${ACR_REGISTRY}/${ACR_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}"

            [ -n "$SOURCE_REF" ] || { echo "missing source_ref when worker-tools exists"; exit 1; }
            echo "reuse source: ${SOURCE_REGISTRY} -> ${SOURCE_REF}"

            ensure_target_tag() {
              local target="$1"
              local src="$2"
              if [ "$target" = "$src" ]; then
                echo "skip copy, target equals source: $target"
                return 0
              fi
              if docker buildx imagetools inspect "$target" >/dev/null 2>&1; then
                echo "skip copy, target already exists: $target"
                return 0
              fi
              docker buildx imagetools create --tag "$target" "$src"
            }

            ensure_target_tag "$GHCR_TARGET" "$SOURCE_REF"
            ensure_target_tag "$TCR_TARGET" "$SOURCE_REF"
            ensure_target_tag "$ACR_TARGET" "$SOURCE_REF"
            exit 0
          fi

          [ "${{ needs.publish-worker-tools-amd64.result }}" = "success" ] || { echo "amd64 worker tools build failed"; exit 1; }
          [ "${{ needs.publish-worker-tools-arm64.result }}" = "success" ] || { echo "arm64 worker tools build failed"; exit 1; }

          docker buildx imagetools create \
            --tag "docker.io/${DOCKERHUB_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}" \
            "docker.io/${DOCKERHUB_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}-amd64" \
            "docker.io/${DOCKERHUB_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}-arm64"

          docker buildx imagetools create \
            --tag "ghcr.io/${GITHUB_REPOSITORY_OWNER}/lunafox-worker-tools:${TOOLS_TAG}" \
            "ghcr.io/${GITHUB_REPOSITORY_OWNER}/lunafox-worker-tools:${TOOLS_TAG}-amd64" \
            "ghcr.io/${GITHUB_REPOSITORY_OWNER}/lunafox-worker-tools:${TOOLS_TAG}-arm64"

          docker buildx imagetools create \
            --tag "${TCR_REGISTRY}/${TCR_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}" \
            "${TCR_REGISTRY}/${TCR_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}-amd64" \
            "${TCR_REGISTRY}/${TCR_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}-arm64"

          docker buildx imagetools create \
            --tag "${ACR_REGISTRY}/${ACR_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}" \
            "${ACR_REGISTRY}/${ACR_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}-amd64" \
            "${ACR_REGISTRY}/${ACR_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}-arm64"

  publish-images-amd64:
    runs-on: ubuntu-22.04
    needs: validate-tag
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - image: lunafox-server
            context: ./server
            dockerfile: ./server/Dockerfile
          - image: lunafox-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - image: lunafox-nginx
            context: ./docker/nginx
            dockerfile: ./docker/nginx/Dockerfile
          - image: lunafox-agent
            context: ./agent
            dockerfile: ./agent/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate TCR and ACR credentials
        run: |
          set -euo pipefail
          [ -n "${TCR_REGISTRY:-}" ] || { echo "missing TCR_REGISTRY"; exit 1; }
          [ -n "${ACR_REGISTRY:-}" ] || { echo "missing ACR_REGISTRY"; exit 1; }
          [ -n "${{ secrets.TCR_USERNAME }}" ] || { echo "missing TCR_USERNAME"; exit 1; }
          [ -n "${{ secrets.TCR_PASSWORD }}" ] || { echo "missing TCR_PASSWORD"; exit 1; }
          [ -n "${{ secrets.ACR_USERNAME }}" ] || { echo "missing ACR_USERNAME"; exit 1; }
          [ -n "${{ secrets.ACR_PASSWORD }}" ] || { echo "missing ACR_PASSWORD"; exit 1; }

      - name: Log in to Tencent TCR (retry)
