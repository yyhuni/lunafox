name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-global
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  RELEASE_CHANNEL_BRANCH: release-channel
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE != '' && vars.DOCKERHUB_NAMESPACE || 'yyhuni' }}
  TCR_REGISTRY: ${{ vars.TCR_REGISTRY != '' && vars.TCR_REGISTRY || 'ccr.ccs.tencentyun.com' }}
  TCR_NAMESPACE: ${{ vars.TCR_NAMESPACE != '' && vars.TCR_NAMESPACE || 'yyhuni' }}
  RELEASE_STAGING_TAG: ci-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  validate-tag:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      channel: ${{ steps.validate.outputs.channel }}
      prerelease: ${{ steps.validate.outputs.prerelease }}
    steps:
      - id: validate
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          CHANNEL=""
          PRERELEASE="false"

          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHANNEL="stable"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(rc|beta|alpha)\.[0-9]+$ ]]; then
            CHANNEL="canary"
            PRERELEASE="true"
          else
            echo "Tag must be vX.Y.Z or vX.Y.Z-(rc|beta|alpha).N, got: $TAG" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  build-installers:
    runs-on: ubuntu-22.04
    needs: validate-tag
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false

      - name: Build installer binaries
        working-directory: tools/installer
        run: |
          set -euo pipefail
          TAG="${{ needs.validate-tag.outputs.tag }}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          OUT_DIR="$GITHUB_WORKSPACE/dist/release"
          mkdir -p "$OUT_DIR"

          build_one() {
            local goos="$1"
            local goarch="$2"
            local out="$3"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath \
                -ldflags "-s -w \
                -X 'github.com/yyhuni/lunafox/tools/installer/internal/buildinfo.Version=${TAG}' \
                -X 'github.com/yyhuni/lunafox/tools/installer/internal/buildinfo.Commit=${GITHUB_SHA}' \
                -X 'github.com/yyhuni/lunafox/tools/installer/internal/buildinfo.BuildTime=${BUILD_TIME}'" \
                -o "$out" \
                ./cmd/lunafox-installer
            chmod +x "$out"
          }

          build_one "linux" "amd64" "$OUT_DIR/lunafox-installer-linux-amd64"
          build_one "linux" "arm64" "$OUT_DIR/lunafox-installer-linux-arm64"
          build_one "darwin" "amd64" "$OUT_DIR/lunafox-installer-darwin-amd64"
          build_one "darwin" "arm64" "$OUT_DIR/lunafox-installer-darwin-arm64"

          (cd "$OUT_DIR" && sha256sum lunafox-installer-* > checksums.txt)
          ls -lah "$OUT_DIR"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-installers
          path: dist/release/*
          if-no-files-found: error

  prepare-github-release:
    runs-on: ubuntu-22.04
    needs: [validate-tag, build-installers]
    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: release-installers
          path: dist/release

      - name: Prepare GitHub draft release (phase 1)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          name: ${{ needs.validate-tag.outputs.tag }}
          draft: true
          prerelease: ${{ needs.validate-tag.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/release/lunafox-installer-linux-amd64
            dist/release/lunafox-installer-linux-arm64
            dist/release/lunafox-installer-darwin-amd64
            dist/release/lunafox-installer-darwin-arm64
            dist/release/checksums.txt
          fail_on_unmatched_files: true
          overwrite_files: true

  prepare-gitee-release:
    runs-on: ubuntu-22.04
    needs: validate-tag
    env:
      GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
      GITEE_REPO: ${{ secrets.GITEE_REPO }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate gitee secrets
        run: |
          set -euo pipefail
          [ -n "${GITEE_OWNER:-}" ] || { echo "missing GITEE_OWNER"; exit 1; }
          [ -n "${GITEE_REPO:-}" ] || { echo "missing GITEE_REPO"; exit 1; }
          [ -n "${GITEE_TOKEN:-}" ] || { echo "missing GITEE_TOKEN"; exit 1; }

      - name: Push tag to gitee
        run: |
          set -euo pipefail
          TAG="${{ needs.validate-tag.outputs.tag }}"
          git remote add gitee "https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git"
          git push gitee "refs/tags/${TAG}:refs/tags/${TAG}"

  publish-worker-tools-meta:
    runs-on: ubuntu-22.04
    needs: validate-tag
    outputs:
      tools_tag: ${{ steps.meta.outputs.tools_tag }}
      exists: ${{ steps.probe.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute worker tools tag
        id: meta
        run: |
          set -euo pipefail
          TOOLS_HASH="$(sha256sum worker/Dockerfile.tools | awk '{print substr($1,1,16)}')"
          TOOLS_TAG="tools-${TOOLS_HASH}"
          echo "tools_tag=${TOOLS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check worker-tools image in Docker Hub
        id: probe
        run: |
          set -euo pipefail
          REF="docker.io/${DOCKERHUB_NAMESPACE}/lunafox-worker-tools:${{ steps.meta.outputs.tools_tag }}"
          if docker buildx imagetools inspect "$REF" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  publish-worker-tools-amd64:
    runs-on: ubuntu-22.04
    needs: [validate-tag, publish-worker-tools-meta]
    if: needs.publish-worker-tools-meta.outputs.exists != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push worker tools image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile.tools
          target: tools-export
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: |
            GOPROXY=${{ vars.GOPROXY != '' && vars.GOPROXY || 'https://proxy.golang.org,direct' }}
            GOFLAGS=${{ vars.WORKER_TOOLS_GOFLAGS != '' && vars.WORKER_TOOLS_GOFLAGS || '-p=4' }}
            GOMAXPROCS=${{ vars.WORKER_TOOLS_GOMAXPROCS != '' && vars.WORKER_TOOLS_GOMAXPROCS || '4' }}
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker-tools:${{ needs.publish-worker-tools-meta.outputs.tools_tag }}-amd64
            ghcr.io/${{ github.repository_owner }}/lunafox-worker-tools:${{ needs.publish-worker-tools-meta.outputs.tools_tag }}-amd64
          cache-from: |
            type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker-tools:buildcache-amd64
            type=gha,scope=lunafox-worker-tools-amd64
          cache-to: |
            type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker-tools:buildcache-amd64,mode=max

  publish-worker-tools-arm64:
    runs-on: ubuntu-22.04-arm
    needs: [validate-tag, publish-worker-tools-meta]
    if: needs.publish-worker-tools-meta.outputs.exists != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push worker tools image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile.tools
          target: tools-export
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          build-args: |
            GOPROXY=${{ vars.GOPROXY != '' && vars.GOPROXY || 'https://proxy.golang.org,direct' }}
            GOFLAGS=${{ vars.WORKER_TOOLS_GOFLAGS != '' && vars.WORKER_TOOLS_GOFLAGS || '-p=4' }}
            GOMAXPROCS=${{ vars.WORKER_TOOLS_GOMAXPROCS != '' && vars.WORKER_TOOLS_GOMAXPROCS || '4' }}
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker-tools:${{ needs.publish-worker-tools-meta.outputs.tools_tag }}-arm64
            ghcr.io/${{ github.repository_owner }}/lunafox-worker-tools:${{ needs.publish-worker-tools-meta.outputs.tools_tag }}-arm64
          cache-from: |
            type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker-tools:buildcache-arm64
            type=gha,scope=lunafox-worker-tools-arm64
          cache-to: |
            type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker-tools:buildcache-arm64,mode=max

  publish-worker-tools:
    runs-on: ubuntu-22.04
    needs: [publish-worker-tools-meta, publish-worker-tools-amd64, publish-worker-tools-arm64]
    if: >
      always() &&
      needs.publish-worker-tools-meta.result == 'success' &&
      (
        needs.publish-worker-tools-meta.outputs.exists == 'true' ||
        (needs.publish-worker-tools-amd64.result == 'success' && needs.publish-worker-tools-arm64.result == 'success')
      )
    outputs:
      tools_tag: ${{ needs.publish-worker-tools-meta.outputs.tools_tag }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish worker-tools multi-arch tag
        run: |
          set -euo pipefail
          TOOLS_TAG="${{ needs.publish-worker-tools-meta.outputs.tools_tag }}"
          EXISTS="${{ needs.publish-worker-tools-meta.outputs.exists }}"
          [ -n "$TOOLS_TAG" ] || { echo "missing tools tag"; exit 1; }

          if [ "$EXISTS" = "true" ]; then
            SRC="docker.io/${DOCKERHUB_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}"
            GHCR_TARGET="ghcr.io/${GITHUB_REPOSITORY_OWNER}/lunafox-worker-tools:${TOOLS_TAG}"
            docker buildx imagetools create --tag "$GHCR_TARGET" "$SRC"
            exit 0
          fi

          [ "${{ needs.publish-worker-tools-amd64.result }}" = "success" ] || { echo "amd64 worker tools build failed"; exit 1; }
          [ "${{ needs.publish-worker-tools-arm64.result }}" = "success" ] || { echo "arm64 worker tools build failed"; exit 1; }

          docker buildx imagetools create \
            --tag "docker.io/${DOCKERHUB_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}" \
            "docker.io/${DOCKERHUB_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}-amd64" \
            "docker.io/${DOCKERHUB_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}-arm64"

          docker buildx imagetools create \
            --tag "ghcr.io/${GITHUB_REPOSITORY_OWNER}/lunafox-worker-tools:${TOOLS_TAG}" \
            "ghcr.io/${GITHUB_REPOSITORY_OWNER}/lunafox-worker-tools:${TOOLS_TAG}-amd64" \
            "ghcr.io/${GITHUB_REPOSITORY_OWNER}/lunafox-worker-tools:${TOOLS_TAG}-arm64"

  publish-images-amd64:
    runs-on: ubuntu-22.04
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: lunafox-server
            context: ./server
            dockerfile: ./server/Dockerfile
          - image: lunafox-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - image: lunafox-nginx
            context: ./docker/nginx
            dockerfile: ./docker/nginx/Dockerfile
          - image: lunafox-agent
            context: ./agent
            dockerfile: ./agent/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: |
            GOPROXY=${{ vars.GOPROXY != '' && vars.GOPROXY || 'https://proxy.golang.org,direct' }}
          cache-from: |
            type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:buildcache-amd64
            type=gha,scope=${{ matrix.image }}-amd64
          cache-to: |
            type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:buildcache-amd64,mode=max
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:${{ env.RELEASE_STAGING_TAG }}-amd64
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ env.RELEASE_STAGING_TAG }}-amd64

  publish-images-arm64:
    runs-on: ubuntu-22.04-arm
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: lunafox-server
            context: ./server
            dockerfile: ./server/Dockerfile
          - image: lunafox-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - image: lunafox-nginx
            context: ./docker/nginx
            dockerfile: ./docker/nginx/Dockerfile
          - image: lunafox-agent
            context: ./agent
            dockerfile: ./agent/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          build-args: |
            GOPROXY=${{ vars.GOPROXY != '' && vars.GOPROXY || 'https://proxy.golang.org,direct' }}
          cache-from: |
            type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:buildcache-arm64
            type=gha,scope=${{ matrix.image }}-arm64
          cache-to: |
            type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:buildcache-arm64,mode=max
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:${{ env.RELEASE_STAGING_TAG }}-arm64
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ env.RELEASE_STAGING_TAG }}-arm64

  publish-worker-image-amd64:
    runs-on: ubuntu-22.04
    needs: [validate-tag, publish-worker-tools]
    if: >
      always() &&
      needs.validate-tag.result == 'success' &&
      needs.publish-worker-tools.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push worker image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          cache-from: |
            type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker:buildcache-amd64
            type=gha,scope=lunafox-worker-amd64
          cache-to: |
            type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker:buildcache-amd64,mode=max
          build-args: |
            GOPROXY=${{ vars.GOPROXY != '' && vars.GOPROXY || 'https://proxy.golang.org,direct' }}
            WORKER_TOOLS_IMAGE=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker-tools:${{ needs.publish-worker-tools.outputs.tools_tag }}
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker:${{ env.RELEASE_STAGING_TAG }}-amd64
            ghcr.io/${{ github.repository_owner }}/lunafox-worker:${{ env.RELEASE_STAGING_TAG }}-amd64

  publish-worker-image-arm64:
    runs-on: ubuntu-22.04-arm
    needs: [validate-tag, publish-worker-tools]
    if: >
      always() &&
      needs.validate-tag.result == 'success' &&
      needs.publish-worker-tools.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push worker image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          cache-from: |
            type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker:buildcache-arm64
            type=gha,scope=lunafox-worker-arm64
          cache-to: |
            type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker:buildcache-arm64,mode=max
          build-args: |
            GOPROXY=${{ vars.GOPROXY != '' && vars.GOPROXY || 'https://proxy.golang.org,direct' }}
            WORKER_TOOLS_IMAGE=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker-tools:${{ needs.publish-worker-tools.outputs.tools_tag }}
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/lunafox-worker:${{ env.RELEASE_STAGING_TAG }}-arm64
            ghcr.io/${{ github.repository_owner }}/lunafox-worker:${{ env.RELEASE_STAGING_TAG }}-arm64

  merge-staging-images:
    runs-on: ubuntu-22.04
    needs:
      - validate-tag
      - publish-images-amd64
      - publish-images-arm64
      - publish-worker-image-amd64
      - publish-worker-image-arm64
    if: >
      always() &&
      needs.validate-tag.result == 'success' &&
      needs.publish-images-amd64.result == 'success' &&
      needs.publish-images-arm64.result == 'success' &&
      needs.publish-worker-image-amd64.result == 'success' &&
      needs.publish-worker-image-arm64.result == 'success'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge staging manifests and persist digests
        run: |
          set -euo pipefail
          mkdir -p dist/image-digests
          images=(
            lunafox-server
            lunafox-frontend
            lunafox-nginx
            lunafox-agent
            lunafox-worker
          )

          for image in "${images[@]}"; do
            docker_amd64_ref="docker.io/${DOCKERHUB_NAMESPACE}/${image}:${RELEASE_STAGING_TAG}-amd64"
            docker_arm64_ref="docker.io/${DOCKERHUB_NAMESPACE}/${image}:${RELEASE_STAGING_TAG}-arm64"
            ghcr_amd64_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${image}:${RELEASE_STAGING_TAG}-amd64"
            ghcr_arm64_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${image}:${RELEASE_STAGING_TAG}-arm64"

            docker buildx imagetools inspect "$docker_amd64_ref" >/dev/null
            docker buildx imagetools inspect "$docker_arm64_ref" >/dev/null
            docker buildx imagetools inspect "$ghcr_amd64_ref" >/dev/null
            docker buildx imagetools inspect "$ghcr_arm64_ref" >/dev/null

            docker_staging_ref="docker.io/${DOCKERHUB_NAMESPACE}/${image}:${RELEASE_STAGING_TAG}"
            ghcr_staging_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${image}:${RELEASE_STAGING_TAG}"

            docker buildx imagetools create --tag "$docker_staging_ref" "$docker_amd64_ref" "$docker_arm64_ref"
            docker buildx imagetools create --tag "$ghcr_staging_ref" "$ghcr_amd64_ref" "$ghcr_arm64_ref"

            digest="$(docker buildx imagetools inspect "$docker_staging_ref" | awk '/Digest:/ {print $2; exit}')"
            [[ "$digest" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "invalid digest for ${image}: $digest"; exit 1; }

            {
              echo "IMAGE=${image}"
              echo "DIGEST=${digest}"
              echo "STAGING_TAG=${RELEASE_STAGING_TAG}"
              echo "DOCKERHUB_REF=docker.io/${DOCKERHUB_NAMESPACE}/${image}@${digest}"
              echo "GHCR_REF=ghcr.io/${GITHUB_REPOSITORY_OWNER}/${image}@${digest}"
            } > "dist/image-digests/${image}.env"
          done

      - name: Upload image digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-image-digests
          path: dist/image-digests/*.env
          if-no-files-found: error

  update-release-channel:
    runs-on: ubuntu-22.04
    needs: [validate-tag, build-installers, promote-images, finalize-github-release, finalize-gitee-release]
    if: >
      always() &&
      needs.validate-tag.result == 'success' &&
      needs.build-installers.result == 'success' &&
      needs.promote-images.result == 'success' &&
      needs.finalize-github-release.result == 'success' &&
      needs.finalize-gitee-release.result == 'success'
    env:
      GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
      GITEE_REPO: ${{ secrets.GITEE_REPO }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: release-installers
          path: dist/release

      - name: Download image digest artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-image-digests
          path: dist/image-digests

      - name: Generate channel files
        run: |
          set -euo pipefail
          TAG="${{ needs.validate-tag.outputs.tag }}"
          CHANNEL="${{ needs.validate-tag.outputs.channel }}"
          CHANNEL_DIR="$GITHUB_WORKSPACE/dist/channel"
          rm -rf "$CHANNEL_DIR"
          mkdir -p "$CHANNEL_DIR/channels"

          CHECKSUM_FILE="dist/release/checksums.txt"
          linux_amd64_sha="$(awk '$2=="lunafox-installer-linux-amd64"{print $1}' "$CHECKSUM_FILE")"
          linux_arm64_sha="$(awk '$2=="lunafox-installer-linux-arm64"{print $1}' "$CHECKSUM_FILE")"
          darwin_amd64_sha="$(awk '$2=="lunafox-installer-darwin-amd64"{print $1}' "$CHECKSUM_FILE")"
          darwin_arm64_sha="$(awk '$2=="lunafox-installer-darwin-arm64"{print $1}' "$CHECKSUM_FILE")"

          [ -n "$linux_amd64_sha" ] || { echo "missing linux amd64 checksum"; exit 1; }
          [ -n "$linux_arm64_sha" ] || { echo "missing linux arm64 checksum"; exit 1; }
          [ -n "$darwin_amd64_sha" ] || { echo "missing darwin amd64 checksum"; exit 1; }
          [ -n "$darwin_arm64_sha" ] || { echo "missing darwin arm64 checksum"; exit 1; }

          agent_digest="$(awk -F= '$1=="DIGEST"{print $2}' dist/image-digests/lunafox-agent.env | tr -d '\r')"
          worker_digest="$(awk -F= '$1=="DIGEST"{print $2}' dist/image-digests/lunafox-worker.env | tr -d '\r')"
          [[ "$agent_digest" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "invalid agent digest: $agent_digest"; exit 1; }
          [[ "$worker_digest" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "invalid worker digest: $worker_digest"; exit 1; }
          agent_tcr_ref="${TCR_REGISTRY}/${TCR_NAMESPACE}/lunafox-agent@${agent_digest}"
          agent_dockerhub_ref="docker.io/${DOCKERHUB_NAMESPACE}/lunafox-agent@${agent_digest}"
          agent_ghcr_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/lunafox-agent@${agent_digest}"
          worker_tcr_ref="${TCR_REGISTRY}/${TCR_NAMESPACE}/lunafox-worker@${worker_digest}"
          worker_dockerhub_ref="docker.io/${DOCKERHUB_NAMESPACE}/lunafox-worker@${worker_digest}"
          worker_ghcr_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/lunafox-worker@${worker_digest}"

          cat > "$CHANNEL_DIR/channels/${TAG}.env" <<EOF
          SCHEMA_VERSION=2
          VERSION=${TAG}
          GITHUB_BASE_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}
          GITEE_BASE_URL=https://gitee.com/${GITEE_OWNER}/${GITEE_REPO}/releases/download/${TAG}
          LINUX_AMD64_ASSET=lunafox-installer-linux-amd64
          LINUX_AMD64_SHA256=${linux_amd64_sha}
          LINUX_ARM64_ASSET=lunafox-installer-linux-arm64
          LINUX_ARM64_SHA256=${linux_arm64_sha}
          DARWIN_AMD64_ASSET=lunafox-installer-darwin-amd64
          DARWIN_AMD64_SHA256=${darwin_amd64_sha}
          DARWIN_ARM64_ASSET=lunafox-installer-darwin-arm64
          DARWIN_ARM64_SHA256=${darwin_arm64_sha}
          IMAGE_REGISTRY=docker.io
          IMAGE_NAMESPACE=${DOCKERHUB_NAMESPACE}
          AGENT_IMAGE_REFS=${agent_dockerhub_ref},${agent_ghcr_ref},${agent_tcr_ref}
          WORKER_IMAGE_REFS=${worker_dockerhub_ref},${worker_ghcr_ref},${worker_tcr_ref}
          EOF

          if [ "$CHANNEL" = "stable" ]; then
            cp "$CHANNEL_DIR/channels/${TAG}.env" "$CHANNEL_DIR/channels/stable.env"
          elif [ "$CHANNEL" = "canary" ]; then
            cp "$CHANNEL_DIR/channels/${TAG}.env" "$CHANNEL_DIR/channels/canary.env"
          else
            echo "unexpected channel: $CHANNEL" >&2
            exit 1
          fi

          if [ "$CHANNEL" = "stable" ]; then
            ./scripts/installer/verify-channel-schema.sh "$CHANNEL_DIR/channels/${TAG}.env" "$CHANNEL_DIR/channels/stable.env"
          else
            ./scripts/installer/verify-channel-schema.sh "$CHANNEL_DIR/channels/${TAG}.env" "$CHANNEL_DIR/channels/canary.env"
          fi

          echo "CHANNEL_DIR=$CHANNEL_DIR" >> "$GITHUB_ENV"

      - name: Publish release-channel to github and gitee
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "${GITEE_OWNER:-}" ] || { echo "missing GITEE_OWNER"; exit 1; }
          [ -n "${GITEE_REPO:-}" ] || { echo "missing GITEE_REPO"; exit 1; }
          [ -n "${GITEE_TOKEN:-}" ] || { echo "missing GITEE_TOKEN"; exit 1; }

          WORK_DIR="$(mktemp -d)"
          trap 'rm -rf "$WORK_DIR"' EXIT
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git clone --depth 1 --branch "${RELEASE_CHANNEL_BRANCH}" "$REPO_URL" "$WORK_DIR"; then
            :
          else
            git clone --depth 1 "$REPO_URL" "$WORK_DIR"
            (
              cd "$WORK_DIR"
              git checkout --orphan "${RELEASE_CHANNEL_BRANCH}"
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi

          mkdir -p "$WORK_DIR/channels"
          cp "$CHANNEL_DIR/channels/"*.env "$WORK_DIR/channels/"

          (
            cd "$WORK_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add channels/*.env
            if git diff --staged --quiet; then
              echo "release-channel unchanged"
            else
              git commit -m "chore(channel): update ${{ needs.validate-tag.outputs.channel }} to ${{ needs.validate-tag.outputs.tag }}"
              git push origin "${RELEASE_CHANNEL_BRANCH}"
            fi
            git remote add gitee "https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git"
            git push gitee "${RELEASE_CHANNEL_BRANCH}:${RELEASE_CHANNEL_BRANCH}"
          )

  promote-images:
    runs-on: ubuntu-22.04
    needs: [validate-tag, merge-staging-images]
    if: >
      always() &&
      needs.validate-tag.result == 'success' &&
      needs.merge-staging-images.result == 'success'
    steps:
      - name: Download image digest artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-image-digests
          path: dist/image-digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote staging digest to release tag (phase 2)
        run: |
          set -euo pipefail
          FINAL_TAG="${{ needs.validate-tag.outputs.tag }}"
          [ -n "$FINAL_TAG" ] || { echo "missing final tag"; exit 1; }
          PLAN_FILE="$(mktemp)"
          trap 'rm -f "$PLAN_FILE"' EXIT

          shopt -s nullglob
          files=(dist/image-digests/*.env)
          [ "${#files[@]}" -gt 0 ] || { echo "missing image digest artifacts"; exit 1; }

          # Preflight all source references first; only promote when all checks pass.
          for file in "${files[@]}"; do
            IMAGE=""
            DIGEST=""
            DOCKERHUB_REF=""
            GHCR_REF=""
            # shellcheck disable=SC1090
            source "$file"

            [ -n "$IMAGE" ] || { echo "missing IMAGE in $file"; exit 1; }
            [[ "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "invalid DIGEST in $file: $DIGEST"; exit 1; }
            [ -n "$DOCKERHUB_REF" ] || { echo "missing DOCKERHUB_REF in $file"; exit 1; }
            [ -n "$GHCR_REF" ] || { echo "missing GHCR_REF in $file"; exit 1; }

            docker buildx imagetools inspect "$DOCKERHUB_REF" >/dev/null
            docker buildx imagetools inspect "$GHCR_REF" >/dev/null

            printf '%s|%s|%s|%s\n' "$IMAGE" "$DIGEST" "$DOCKERHUB_REF" "$GHCR_REF" >> "$PLAN_FILE"
          done

          while IFS='|' read -r IMAGE DIGEST DOCKERHUB_REF GHCR_REF; do
            docker_target="docker.io/${DOCKERHUB_NAMESPACE}/${IMAGE}:${FINAL_TAG}"
            ghcr_target="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${IMAGE}:${FINAL_TAG}"

            echo "promote ${IMAGE}: ${DIGEST}"
            docker buildx imagetools create --tag "$docker_target" "$DOCKERHUB_REF"
            docker buildx imagetools create --tag "$ghcr_target" "$GHCR_REF"
          done < "$PLAN_FILE"

  sync-tcr:
    runs-on: ubuntu-22.04
    needs: [validate-tag, publish-worker-tools, promote-images]
    if: >
      always() &&
      needs.validate-tag.result == 'success' &&
      needs.publish-worker-tools.result == 'success' &&
      needs.promote-images.result == 'success'
    steps:
      - name: Download image digest artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-image-digests
          path: dist/image-digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Validate Tencent TCR credentials
        run: |
          set -euo pipefail
          [ -n "${{ secrets.TCR_USERNAME }}" ] || { echo "missing TCR_USERNAME"; exit 1; }
          [ -n "${{ secrets.TCR_PASSWORD }}" ] || { echo "missing TCR_PASSWORD"; exit 1; }

      - name: Log in to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Sync final tags to Tencent TCR (strict gate)
        run: |
          set -euo pipefail
          FINAL_TAG="${{ needs.validate-tag.outputs.tag }}"
          TOOLS_TAG="${{ needs.publish-worker-tools.outputs.tools_tag }}"
          [ -n "$FINAL_TAG" ] || { echo "missing final tag"; exit 1; }
          [ -n "$TOOLS_TAG" ] || { echo "missing worker-tools tag"; exit 1; }

          PLAN_FILE="$(mktemp)"
          trap 'rm -f "$PLAN_FILE"' EXIT

          shopt -s nullglob
          files=(dist/image-digests/*.env)
          [ "${#files[@]}" -gt 0 ] || { echo "missing image digest artifacts"; exit 1; }

          for file in "${files[@]}"; do
            IMAGE=""
            DIGEST=""
            DOCKERHUB_REF=""
            # shellcheck disable=SC1090
            source "$file"

            [ -n "$IMAGE" ] || { echo "missing IMAGE in $file"; exit 1; }
            [[ "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]] || { echo "invalid DIGEST in $file: $DIGEST"; exit 1; }
            [ -n "$DOCKERHUB_REF" ] || { echo "missing DOCKERHUB_REF in $file"; exit 1; }

            docker buildx imagetools inspect "$DOCKERHUB_REF" >/dev/null
            printf '%s|%s|%s\n' "$IMAGE" "$DIGEST" "$DOCKERHUB_REF" >> "$PLAN_FILE"
          done

          tools_src="docker.io/${DOCKERHUB_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}"
          tools_target="${TCR_REGISTRY}/${TCR_NAMESPACE}/lunafox-worker-tools:${TOOLS_TAG}"
          docker buildx imagetools inspect "$tools_src" >/dev/null
          docker buildx imagetools create --tag "$tools_target" "$tools_src"
          docker buildx imagetools inspect "$tools_target" >/dev/null

          while IFS='|' read -r IMAGE DIGEST DOCKERHUB_REF; do
            tcr_target="${TCR_REGISTRY}/${TCR_NAMESPACE}/${IMAGE}:${FINAL_TAG}"
            echo "sync ${IMAGE}: ${DIGEST}"
            docker buildx imagetools create --tag "$tcr_target" "$DOCKERHUB_REF"
            docker buildx imagetools inspect "$tcr_target" >/dev/null
          done < "$PLAN_FILE"

  finalize-github-release:
    runs-on: ubuntu-22.04
    needs: [validate-tag, prepare-github-release, sync-tcr]
    if: always()
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Verify release prerequisites
        run: |
          set -euo pipefail
          FAILED=()
          check_gate() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              FAILED+=("${name}=${result}")
            fi
          }

          check_gate "validate-tag" "${{ needs.validate-tag.result }}"
          check_gate "prepare-github-release" "${{ needs.prepare-github-release.result }}"
          check_gate "sync-tcr" "${{ needs.sync-tcr.result }}"

          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "github release blocked by prerequisite jobs:" >&2
            for item in "${FAILED[@]}"; do
              echo "  - ${item}" >&2
            done
            exit 1
          fi

      - name: Publish GitHub draft release (phase 2)
        run: |
          set -euo pipefail
          TAG="${{ needs.validate-tag.outputs.tag }}"
          PRERELEASE="${{ needs.validate-tag.outputs.prerelease }}"
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          STATUS=$(curl -sS -o "$TMP_DIR/release.json" -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API}/releases/tags/${TAG}")

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "failed to load github release for tag ${TAG}, status=${STATUS}" >&2
            cat "$TMP_DIR/release.json" >&2 || true
            exit 1
          fi

          read -r RELEASE_ID IS_DRAFT < <(python3 - "$TMP_DIR/release.json" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          try:
              with open(path, "r", encoding="utf-8") as f:
                  payload = json.load(f)
          except Exception:
              print("")
              sys.exit(0)

          release_id = payload.get("id") if isinstance(payload, dict) else None
          draft = payload.get("draft") if isinstance(payload, dict) else None
          if release_id is None:
              print("")
          else:
              print(f"{release_id} {'true' if draft else 'false'}")
          PY
          )

          [ -n "${RELEASE_ID:-}" ] || { echo "missing github release id for tag ${TAG}" >&2; exit 1; }
          [ -n "${IS_DRAFT:-}" ] || IS_DRAFT="false"

          if [ "$IS_DRAFT" != "true" ]; then
            echo "github release for ${TAG} is already published"
            exit 0
          fi

          PAYLOAD=$(cat <<JSON
          {"draft":false,"prerelease":${PRERELEASE},"name":"${TAG}"}
          JSON
          )

          PATCH_STATUS=$(curl -sS -o "$TMP_DIR/patch.json" -w "%{http_code}" \
            -X PATCH "${API}/releases/${RELEASE_ID}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [ "$PATCH_STATUS" -lt 200 ] || [ "$PATCH_STATUS" -ge 300 ]; then
            echo "failed to publish github release ${RELEASE_ID}, status=${PATCH_STATUS}" >&2
            cat "$TMP_DIR/patch.json" >&2 || true
            exit 1
          fi

  finalize-gitee-release:
    runs-on: ubuntu-22.04
    needs: [validate-tag, build-installers, prepare-gitee-release, sync-tcr]
    if: always()
    env:
      GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
      GITEE_REPO: ${{ secrets.GITEE_REPO }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - name: Verify release prerequisites
        run: |
          set -euo pipefail
          FAILED=()
          check_gate() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              FAILED+=("${name}=${result}")
            fi
          }

          check_gate "validate-tag" "${{ needs.validate-tag.result }}"
          check_gate "build-installers" "${{ needs.build-installers.result }}"
          check_gate "prepare-gitee-release" "${{ needs.prepare-gitee-release.result }}"
          check_gate "sync-tcr" "${{ needs.sync-tcr.result }}"

          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "gitee release blocked by prerequisite jobs:" >&2
            for item in "${FAILED[@]}"; do
              echo "  - ${item}" >&2
            done
            exit 1
          fi

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: release-installers
          path: dist/release

      - name: Validate gitee secrets
        run: |
          set -euo pipefail
          [ -n "${GITEE_OWNER:-}" ] || { echo "missing GITEE_OWNER"; exit 1; }
          [ -n "${GITEE_REPO:-}" ] || { echo "missing GITEE_REPO"; exit 1; }
          [ -n "${GITEE_TOKEN:-}" ] || { echo "missing GITEE_TOKEN"; exit 1; }

      - name: Publish Gitee release (phase 2)
        run: |
          set -euo pipefail
          # Gitee Releases API does not expose a draft field, so create
          # release only after image promotion completes.
          TAG="${{ needs.validate-tag.outputs.tag }}"
          PRERELEASE="${{ needs.validate-tag.outputs.prerelease }}"
          API="https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          PAYLOAD=$(cat <<JSON
          {"tag_name":"${TAG}","name":"${TAG}","body":"Automated release for ${TAG}","prerelease":${PRERELEASE}}
          JSON
          )

          extract_release_id() {
            python3 - "$1" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          try:
              with open(path, "r", encoding="utf-8") as f:
                  payload = json.load(f)
          except Exception:
              print("")
              sys.exit(0)

          if isinstance(payload, dict):
              release_id = payload.get("id")
              if release_id is not None:
                  print(release_id)
                  sys.exit(0)

          print("")
          PY
          }

          STATUS=$(curl -sS -o "$TMP_DIR/create.json" -w "%{http_code}" \
            -X POST "${API}/releases?access_token=${GITEE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          RELEASE_ID=""
          LOOKUP_STATUS=""
          COMPAT_STATUS=""

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            RELEASE_ID="$(extract_release_id "$TMP_DIR/create.json")"
          fi

          # Compatibility fallback: some gitee instances may reject or ignore
          # prerelease fields. Retry create with a minimal payload.
          if [ -z "$RELEASE_ID" ] && [ "$PRERELEASE" = "true" ]; then
            COMPAT_PAYLOAD=$(cat <<JSON
          {"tag_name":"${TAG}","name":"${TAG}","body":"Automated release for ${TAG}"}
          JSON
            )
            COMPAT_STATUS=$(curl -sS -o "$TMP_DIR/create-compat.json" -w "%{http_code}" \
              -X POST "${API}/releases?access_token=${GITEE_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$COMPAT_PAYLOAD")
            if [ "$COMPAT_STATUS" -ge 200 ] && [ "$COMPAT_STATUS" -lt 300 ]; then
              RELEASE_ID="$(extract_release_id "$TMP_DIR/create-compat.json")"
            fi
          fi

          if [ -z "$RELEASE_ID" ]; then
            for delay in 0 2 4 6; do
              if [ "$delay" -gt 0 ]; then
                sleep "$delay"
              fi
              LOOKUP_STATUS=$(curl -sS -o "$TMP_DIR/release.json" -w "%{http_code}" \
                "${API}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")
              if [ "$LOOKUP_STATUS" -ge 200 ] && [ "$LOOKUP_STATUS" -lt 300 ]; then
                RELEASE_ID="$(extract_release_id "$TMP_DIR/release.json")"
                if [ -n "$RELEASE_ID" ]; then
                  break
                fi
              fi
            done
          fi

          if [ -z "$RELEASE_ID" ]; then
            echo "failed to resolve gitee release id for tag ${TAG}" >&2
            echo "create status: ${STATUS}" >&2
            if [ -n "${COMPAT_STATUS}" ]; then
              echo "compat create status: ${COMPAT_STATUS}" >&2
            fi
            if [ -n "${LOOKUP_STATUS}" ]; then
              echo "lookup status: ${LOOKUP_STATUS}" >&2
            fi
            echo "create response:" >&2
            cat "$TMP_DIR/create.json" >&2 || true
            if [ -f "$TMP_DIR/create-compat.json" ]; then
              echo "compat create response:" >&2
              cat "$TMP_DIR/create-compat.json" >&2 || true
            fi
            if [ -f "$TMP_DIR/release.json" ]; then
              echo "lookup response:" >&2
              cat "$TMP_DIR/release.json" >&2 || true
            fi
            exit 1
          fi

          for file in dist/release/lunafox-installer-* dist/release/checksums.txt; do
            name="$(basename "$file")"
            curl -fsSL \
              -X POST "${API}/releases/${RELEASE_ID}/attach_files?access_token=${GITEE_TOKEN}" \
              -F "name=${name}" \
              -F "file=@${file}" >/dev/null
          done
