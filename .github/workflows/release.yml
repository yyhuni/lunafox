    needs: [validate-tag, prepare-github-release, promote-images, verify-tcr-images, verify-tcr-worker-tools, verify-acr-images, verify-acr-worker-tools]
    if: always()
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Verify release prerequisites
        run: |
          set -euo pipefail
          FAILED=()
          check_gate() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              FAILED+=("${name}=${result}")
            fi
          }

          check_gate "validate-tag" "${{ needs.validate-tag.result }}"
          check_gate "prepare-github-release" "${{ needs.prepare-github-release.result }}"
          check_gate "promote-images" "${{ needs.promote-images.result }}"
          check_gate "verify-tcr-images" "${{ needs.verify-tcr-images.result }}"
          check_gate "verify-tcr-worker-tools" "${{ needs.verify-tcr-worker-tools.result }}"
          check_gate "verify-acr-images" "${{ needs.verify-acr-images.result }}"
          check_gate "verify-acr-worker-tools" "${{ needs.verify-acr-worker-tools.result }}"

          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "github release blocked by prerequisite jobs:" >&2
            for item in "${FAILED[@]}"; do
              echo "  - ${item}" >&2
            done
            exit 1
          fi

      - name: Publish GitHub draft release (phase 2)
        run: |
          set -euo pipefail
          TAG="${{ needs.validate-tag.outputs.tag }}"
          PRERELEASE="${{ needs.validate-tag.outputs.prerelease }}"
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          extract_release_meta() {
            python3 - "$1" "$2" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          tag = sys.argv[2]
          try:
              with open(path, "r", encoding="utf-8") as f:
                  payload = json.load(f)
          except Exception:
              print("")
              sys.exit(0)

          def emit(item):
              if not isinstance(item, dict):
                  return False
              release_id = item.get("id")
              if release_id is None:
                  return False
              draft = item.get("draft")
              print(f"{release_id} {'true' if draft else 'false'}")
              return True

          if isinstance(payload, dict):
              emit(payload)
              sys.exit(0)

          if isinstance(payload, list):
              for item in payload:
                  if isinstance(item, dict) and item.get("tag_name") == tag:
                      emit(item)
                      sys.exit(0)

          print("")
          PY
          }

          RELEASE_ID=""
          IS_DRAFT="false"
          LIST_STATUS=""

          STATUS=$(curl -sS -o "$TMP_DIR/release.json" -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API}/releases/tags/${TAG}")

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            read -r RELEASE_ID IS_DRAFT < <(extract_release_meta "$TMP_DIR/release.json" "$TAG")
          elif [ "$STATUS" -eq 404 ]; then
            LIST_STATUS=$(curl -sS -o "$TMP_DIR/releases.json" -w "%{http_code}" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${API}/releases?per_page=100")

            if [ "$LIST_STATUS" -ge 200 ] && [ "$LIST_STATUS" -lt 300 ]; then
              read -r RELEASE_ID IS_DRAFT < <(extract_release_meta "$TMP_DIR/releases.json" "$TAG")
            else
              echo "failed to list github releases for fallback lookup, status=${LIST_STATUS}" >&2
              cat "$TMP_DIR/releases.json" >&2 || true
              exit 1
            fi
          else
            echo "failed to load github release for tag ${TAG}, status=${STATUS}" >&2
            cat "$TMP_DIR/release.json" >&2 || true
            exit 1
          fi

          if [ -z "${RELEASE_ID:-}" ]; then
            echo "missing github release id for tag ${TAG}" >&2
            echo "lookup by tag status: ${STATUS}" >&2
            if [ -n "$LIST_STATUS" ]; then
              echo "lookup by list status: ${LIST_STATUS}" >&2
            fi
            exit 1
          fi
          [ -n "${IS_DRAFT:-}" ] || IS_DRAFT="false"

          if [ "$IS_DRAFT" != "true" ]; then
            echo "github release for ${TAG} is already published"
            exit 0
          fi

          DETAIL_STATUS=$(curl -sS -o "$TMP_DIR/release-detail.json" -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API}/releases/${RELEASE_ID}")
          if [ "$DETAIL_STATUS" -lt 200 ] || [ "$DETAIL_STATUS" -ge 300 ]; then
            echo "failed to load github release detail ${RELEASE_ID}, status=${DETAIL_STATUS}" >&2
            cat "$TMP_DIR/release-detail.json" >&2 || true
            exit 1
          fi

          PAYLOAD=$(python3 - "$TMP_DIR/release-detail.json" "$TAG" "$PRERELEASE" <<'PY'
          import json
          import re
          import sys

          path = sys.argv[1]
          tag = sys.argv[2]
          prerelease = sys.argv[3] == "true"

          with open(path, "r", encoding="utf-8") as f:
            payload = json.load(f)

          body = payload.get("body", "") if isinstance(payload, dict) else ""
          if body is None:
            body = ""
          body = str(body)

          marker_start = "<!-- codex-release-notice:start -->"
          marker_end = "<!-- codex-release-notice:end -->"
          pattern = re.compile(re.escape(marker_start) + r".*?" + re.escape(marker_end) + r"\n*", re.DOTALL)
          body = re.sub(pattern, "", body).lstrip()

          if prerelease:
            notice_lines = [
              marker_start,
              "## Release Notice",
              "- [CN] 预发布测试版本，仅用于验证和试用。",
              "- [EN] Pre-release build for validation and testing.",
              "- [CN] 不建议在生产环境使用。",
              "- [EN] Not recommended for production environments.",
              marker_end,
            ]
          else:
            notice_lines = [
              marker_start,
              "## Release Notice",
              "- [CN] 稳定版本，可用于生产环境。",
              "- [EN] Stable release intended for production use.",
              "- [CN] 升级前请先备份数据并阅读升级说明。",
              "- [EN] Review upgrade notes and back up data before upgrading.",
              marker_end,
            ]

          notice = "\n".join(notice_lines)
          merged_body = notice if not body else f"{notice}\n\n{body}"

          out = {
            "draft": False,
            "prerelease": prerelease,
            "name": tag,
            "body": merged_body,
          }
          print(json.dumps(out, ensure_ascii=False))
          PY
          )

          PATCH_STATUS=$(curl -sS -o "$TMP_DIR/patch.json" -w "%{http_code}" \
            -X PATCH "${API}/releases/${RELEASE_ID}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [ "$PATCH_STATUS" -lt 200 ] || [ "$PATCH_STATUS" -ge 300 ]; then
            echo "failed to publish github release ${RELEASE_ID}, status=${PATCH_STATUS}" >&2
            cat "$TMP_DIR/patch.json" >&2 || true
            exit 1
          fi

  finalize-gitee-release:
    runs-on: ubuntu-22.04
    needs: [validate-tag, build-installers, prepare-gitee-release, promote-images, verify-tcr-images, verify-tcr-worker-tools, verify-acr-images, verify-acr-worker-tools]
    if: always()
    env:
      GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
      GITEE_REPO: ${{ secrets.GITEE_REPO }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - name: Verify release prerequisites
        run: |
          set -euo pipefail
          FAILED=()
          check_gate() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              FAILED+=("${name}=${result}")
            fi
          }

          check_gate "validate-tag" "${{ needs.validate-tag.result }}"
          check_gate "build-installers" "${{ needs.build-installers.result }}"
          check_gate "prepare-gitee-release" "${{ needs.prepare-gitee-release.result }}"
          check_gate "promote-images" "${{ needs.promote-images.result }}"
          check_gate "verify-tcr-images" "${{ needs.verify-tcr-images.result }}"
          check_gate "verify-tcr-worker-tools" "${{ needs.verify-tcr-worker-tools.result }}"
          check_gate "verify-acr-images" "${{ needs.verify-acr-images.result }}"
          check_gate "verify-acr-worker-tools" "${{ needs.verify-acr-worker-tools.result }}"

          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "gitee release blocked by prerequisite jobs:" >&2
            for item in "${FAILED[@]}"; do
              echo "  - ${item}" >&2
            done
            exit 1
          fi

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: release-installers
          path: dist/release

      - name: Validate gitee secrets
        run: |
          set -euo pipefail
          [ -n "${GITEE_OWNER:-}" ] || { echo "missing GITEE_OWNER"; exit 1; }
          [ -n "${GITEE_REPO:-}" ] || { echo "missing GITEE_REPO"; exit 1; }
          [ -n "${GITEE_TOKEN:-}" ] || { echo "missing GITEE_TOKEN"; exit 1; }

      - name: Publish Gitee release (phase 2)
        run: |
          set -euo pipefail
          # Gitee Releases API does not expose a draft field, so create
          # release only after image promotion completes.
          TAG="${{ needs.validate-tag.outputs.tag }}"
          PRERELEASE="${{ needs.validate-tag.outputs.prerelease }}"
          TARGET_COMMITISH="${GITHUB_SHA}"
          [ -n "$TARGET_COMMITISH" ] || { echo "missing target commitish"; exit 1; }
          API="https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          if [ "$PRERELEASE" = "true" ]; then
            RELEASE_NOTICE="[CN] 预发布测试版本，仅用于验证和试用；不建议在生产环境使用。 [EN] Pre-release build for validation and testing; not recommended for production environments."
          else
            RELEASE_NOTICE="[CN] 稳定版本，可用于生产环境；升级前请先备份数据并阅读升级说明。 [EN] Stable release intended for production use; review upgrade notes and back up data before upgrading."
          fi
          RELEASE_BODY="${RELEASE_NOTICE} [EN] Automated release for ${TAG}."

          PAYLOAD=$(python3 - "$TAG" "$TARGET_COMMITISH" "$PRERELEASE" "$RELEASE_BODY" <<'PY'
          import json
          import sys

          tag = sys.argv[1]
          target_commitish = sys.argv[2]
          prerelease = sys.argv[3] == "true"
          body = sys.argv[4]

          payload = {
            "tag_name": tag,
            "target_commitish": target_commitish,
            "name": tag,
            "body": body,
            "prerelease": prerelease,
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY
          )

          extract_release_id() {
            python3 - "$1" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          try:
              with open(path, "r", encoding="utf-8") as f:
                  payload = json.load(f)
          except Exception:
              print("")
              sys.exit(0)

          if isinstance(payload, dict):
              release_id = payload.get("id")
              if release_id is not None:
                  print(release_id)
                  sys.exit(0)

          print("")
          PY
          }

          STATUS=$(curl -sS -o "$TMP_DIR/create.json" -w "%{http_code}" \
            -X POST "${API}/releases?access_token=${GITEE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          RELEASE_ID=""
          LOOKUP_STATUS=""
          COMPAT_STATUS=""

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            RELEASE_ID="$(extract_release_id "$TMP_DIR/create.json")"
          fi

          # Compatibility fallback: some gitee instances may reject or ignore
          # prerelease fields. Retry create with a minimal payload.
          if [ -z "$RELEASE_ID" ] && [ "$PRERELEASE" = "true" ]; then
            COMPAT_PAYLOAD=$(python3 - "$TAG" "$TARGET_COMMITISH" "$RELEASE_BODY" <<'PY'
          import json
          import sys

          tag = sys.argv[1]
          target_commitish = sys.argv[2]
          body = sys.argv[3]

          payload = {
            "tag_name": tag,
            "target_commitish": target_commitish,
            "name": tag,
            "body": body,
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY
            )
            COMPAT_STATUS=$(curl -sS -o "$TMP_DIR/create-compat.json" -w "%{http_code}" \
              -X POST "${API}/releases?access_token=${GITEE_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$COMPAT_PAYLOAD")
            if [ "$COMPAT_STATUS" -ge 200 ] && [ "$COMPAT_STATUS" -lt 300 ]; then
              RELEASE_ID="$(extract_release_id "$TMP_DIR/create-compat.json")"
            fi
          fi

          if [ -z "$RELEASE_ID" ]; then
            for delay in 0 2 4 6; do
              if [ "$delay" -gt 0 ]; then
                sleep "$delay"
              fi
              LOOKUP_STATUS=$(curl -sS -o "$TMP_DIR/release.json" -w "%{http_code}" \
                "${API}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")
              if [ "$LOOKUP_STATUS" -ge 200 ] && [ "$LOOKUP_STATUS" -lt 300 ]; then
                RELEASE_ID="$(extract_release_id "$TMP_DIR/release.json")"
                if [ -n "$RELEASE_ID" ]; then
                  break
                fi
              fi
            done
          fi

          if [ -z "$RELEASE_ID" ]; then
            echo "failed to resolve gitee release id for tag ${TAG}" >&2
            echo "create status: ${STATUS}" >&2
            if [ -n "${COMPAT_STATUS}" ]; then
              echo "compat create status: ${COMPAT_STATUS}" >&2
            fi
            if [ -n "${LOOKUP_STATUS}" ]; then
              echo "lookup status: ${LOOKUP_STATUS}" >&2
            fi
            echo "create response:" >&2
            cat "$TMP_DIR/create.json" >&2 || true
            if [ -f "$TMP_DIR/create-compat.json" ]; then
              echo "compat create response:" >&2
              cat "$TMP_DIR/create-compat.json" >&2 || true
            fi
            if [ -f "$TMP_DIR/release.json" ]; then
              echo "lookup response:" >&2
              cat "$TMP_DIR/release.json" >&2 || true
            fi
            exit 1
          fi

          for file in dist/release/lunafox-installer-* dist/release/checksums.txt; do
            name="$(basename "$file")"
            curl -fsSL \
              -X POST "${API}/releases/${RELEASE_ID}/attach_files?access_token=${GITEE_TOKEN}" \
              -F "name=${name}" \
              -F "file=@${file}" >/dev/null
          done
