name: Run Tests

on:
  workflow_call:
    inputs:
      run_frontend_scripts:
        required: false
        type: boolean
        default: true
      run_worker:
        required: false
        type: boolean
        default: true
      run_server:
        required: false
        type: boolean
        default: true
      run_agent:
        required: false
        type: boolean
        default: true
      run_installer:
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: read

jobs:
  frontend-and-scripts:
    if: inputs.run_frontend_scripts
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    env:
      PNPM_STORE_PATH: ${{ github.workspace }}/.cache/pnpm-store
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install shell tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck shfmt ripgrep

      - name: Prepare pnpm cache dir
        run: mkdir -p "${PNPM_STORE_PATH}"

      - name: Configure pnpm store
        run: pnpm config set store-dir "${PNPM_STORE_PATH}"

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        working-directory: frontend
        run: pnpm run typecheck

      - name: Frontend lint core
        working-directory: frontend
        run: pnpm run lint:core

      - name: Frontend legacy props guard
        working-directory: frontend
        run: pnpm run check:datatable-legacy

      - name: Frontend test
        working-directory: frontend
        run: pnpm run test

      - name: Shell static checks
        run: |
          set -euo pipefail
          sh_files="$(rg --files -g '*.sh' -g '!old/**' || true)"
          [ -n "$sh_files" ] || { echo "no shell files found"; exit 0; }

          while IFS= read -r file; do
            shellcheck "$file"
          done <<< "$sh_files"

          while IFS= read -r file; do
            shfmt -d "$file"
          done <<< "$sh_files"

          while IFS= read -r file; do
            bash -n "$file"
          done <<< "$sh_files"

      - name: Verify script executable bits
        run: |
          set -euo pipefail
          for file in \
            install.sh start.sh restart.sh stop.sh uninstall.sh \
            scripts/cli/*.sh scripts/lib/*.sh scripts/dev/*.sh; do
            [ -x "$file" ] || { echo "script is not executable: $file"; exit 1; }
          done

      - name: Script contract smoke
        run: |
          set -euo pipefail

          ./install.sh --help >/tmp/install-help.log
          ./scripts/dev/install.sh --help >/tmp/dev-install-help.log

          set +e
          ./install.sh --dev >/tmp/install-dev.log 2>&1
          rc_install=$?
          ./start.sh --dev >/tmp/start-dev.log 2>&1
          rc_start=$?
          ./restart.sh --dev >/tmp/restart-dev.log 2>&1
          rc_restart=$?
          set -e

          [ "$rc_install" -eq 2 ] || { cat /tmp/install-dev.log; exit 1; }
          [ "$rc_start" -eq 2 ] || { cat /tmp/start-dev.log; exit 1; }
          [ "$rc_restart" -eq 2 ] || { cat /tmp/restart-dev.log; exit 1; }

          grep -q -- "--dev 已移除，请使用 ./scripts/dev/install.sh" /tmp/install-dev.log
          grep -q -- "请使用 ./scripts/dev/start.sh" /tmp/start-dev.log
          grep -q -- "请使用 ./scripts/dev/restart.sh" /tmp/restart-dev.log

      - name: Verify root does not expose dev entrypoints
        run: |
          set -euo pipefail
          [ ! -e dev-install.sh ] || { echo "dev-install.sh must not exist in repo root"; exit 1; }
          [ ! -e start-dev.sh ] || { echo "start-dev.sh must not exist in repo root"; exit 1; }
          [ ! -e restart-dev.sh ] || { echo "restart-dev.sh must not exist in repo root"; exit 1; }

      - name: Installer download smoke (mock channel + checksum)
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          PORT=18983
          trap 'kill "${HTTP_PID:-}" >/dev/null 2>&1 || true; rm -rf "$TMP_DIR"' EXIT

          mkdir -p "$TMP_DIR/repo/raw/branch/channels" "$TMP_DIR/repo/branch/channels" \
                   "$TMP_DIR/repo/raw/branch/manifests" "$TMP_DIR/repo/branch/manifests" "$TMP_DIR/assets"
          cat > "$TMP_DIR/assets/lunafox-installer-linux-amd64" <<'SCRIPT'
          #!/usr/bin/env bash
          exit 0
          SCRIPT
          chmod +x "$TMP_DIR/assets/lunafox-installer-linux-amd64"
          asset_sha="$(sha256sum "$TMP_DIR/assets/lunafox-installer-linux-amd64" | awk '{print $1}')"

          cat > "$TMP_DIR/repo/raw/branch/channels/stable.env" <<'EOF_STABLE'
          SCHEMA_VERSION=3
          VERSION=v0.0.1
          EOF_STABLE
          cp "$TMP_DIR/repo/raw/branch/channels/stable.env" "$TMP_DIR/repo/branch/channels/stable.env"

          cat > "$TMP_DIR/repo/raw/branch/channels/githubok.env" <<'EOF_STABLE_GITHUB'
          SCHEMA_VERSION=3
          VERSION=v0.0.3
          EOF_STABLE_GITHUB
          cp "$TMP_DIR/repo/raw/branch/channels/githubok.env" "$TMP_DIR/repo/branch/channels/githubok.env"

          cat > "$TMP_DIR/repo/raw/branch/channels/v0.0.1.env" <<EOF_VER
          SCHEMA_VERSION=3
          VERSION=v0.0.1
          GITHUB_BASE_URL=http://127.0.0.1:9/assets
          GITEE_BASE_URL=http://127.0.0.1:${PORT}/assets
          LINUX_AMD64_ASSET=lunafox-installer-linux-amd64
          LINUX_AMD64_SHA256=${asset_sha}
          LINUX_ARM64_ASSET=lunafox-installer-linux-amd64
          LINUX_ARM64_SHA256=${asset_sha}
          DARWIN_AMD64_ASSET=lunafox-installer-linux-amd64
          DARWIN_AMD64_SHA256=${asset_sha}
          DARWIN_ARM64_ASSET=lunafox-installer-linux-amd64
          DARWIN_ARM64_SHA256=${asset_sha}
          RELEASE_MANIFEST=manifests/v0.0.1.yaml
          EOF_VER
          cp "$TMP_DIR/repo/raw/branch/channels/v0.0.1.env" "$TMP_DIR/repo/branch/channels/v0.0.1.env"

          cat > "$TMP_DIR/repo/raw/branch/channels/bad.env" <<'EOF_BAD'
          SCHEMA_VERSION=3
          VERSION=v0.0.2
          EOF_BAD
          cp "$TMP_DIR/repo/raw/branch/channels/bad.env" "$TMP_DIR/repo/branch/channels/bad.env"

          cat > "$TMP_DIR/repo/raw/branch/channels/v0.0.2.env" <<EOF_BAD_VER
          SCHEMA_VERSION=3
          VERSION=v0.0.2
          GITHUB_BASE_URL=http://127.0.0.1:9/assets
          GITEE_BASE_URL=http://127.0.0.1:${PORT}/assets
          LINUX_AMD64_ASSET=lunafox-installer-linux-amd64
          LINUX_AMD64_SHA256=cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
          LINUX_ARM64_ASSET=lunafox-installer-linux-amd64
          LINUX_ARM64_SHA256=cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
          DARWIN_AMD64_ASSET=lunafox-installer-linux-amd64
          DARWIN_AMD64_SHA256=cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
          DARWIN_ARM64_ASSET=lunafox-installer-linux-amd64
          DARWIN_ARM64_SHA256=cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
          RELEASE_MANIFEST=manifests/v0.0.2.yaml
          EOF_BAD_VER
          cp "$TMP_DIR/repo/raw/branch/channels/v0.0.2.env" "$TMP_DIR/repo/branch/channels/v0.0.2.env"

          cat > "$TMP_DIR/repo/raw/branch/channels/v0.0.3.env" <<EOF_GITHUB_OK
          SCHEMA_VERSION=3
          VERSION=v0.0.3
          GITHUB_BASE_URL=http://127.0.0.1:${PORT}/assets
          GITEE_BASE_URL=http://127.0.0.1:9/assets
          LINUX_AMD64_ASSET=lunafox-installer-linux-amd64
          LINUX_AMD64_SHA256=${asset_sha}
          LINUX_ARM64_ASSET=lunafox-installer-linux-amd64
          LINUX_ARM64_SHA256=${asset_sha}
          DARWIN_AMD64_ASSET=lunafox-installer-linux-amd64
          DARWIN_AMD64_SHA256=${asset_sha}
          DARWIN_ARM64_ASSET=lunafox-installer-linux-amd64
          DARWIN_ARM64_SHA256=${asset_sha}
          RELEASE_MANIFEST=manifests/v0.0.3.yaml
          EOF_GITHUB_OK
          cp "$TMP_DIR/repo/raw/branch/channels/v0.0.3.env" "$TMP_DIR/repo/branch/channels/v0.0.3.env"

          cat > "$TMP_DIR/repo/raw/branch/manifests/v0.0.1.yaml" <<'EOF_MANIFEST_V1'
          releaseVersion: "0.0.1"
          agentVersion: "0.0.1"
          workerVersion: "0.0.1"
          agentImageRef: "docker.io/yyhuni/lunafox-agent@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          workerImageRef: "docker.io/yyhuni/lunafox-worker@sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"
          EOF_MANIFEST_V1
          cp "$TMP_DIR/repo/raw/branch/manifests/v0.0.1.yaml" "$TMP_DIR/repo/branch/manifests/v0.0.1.yaml"

          cat > "$TMP_DIR/repo/raw/branch/manifests/v0.0.2.yaml" <<'EOF_MANIFEST_V2'
          releaseVersion: "0.0.2"
          agentVersion: "0.0.2"
          workerVersion: "0.0.2"
          agentImageRef: "docker.io/yyhuni/lunafox-agent@sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc"
          workerImageRef: "docker.io/yyhuni/lunafox-worker@sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd"
          EOF_MANIFEST_V2
          cp "$TMP_DIR/repo/raw/branch/manifests/v0.0.2.yaml" "$TMP_DIR/repo/branch/manifests/v0.0.2.yaml"

          cat > "$TMP_DIR/repo/raw/branch/manifests/v0.0.3.yaml" <<'EOF_MANIFEST_V3'
          releaseVersion: "0.0.3"
          agentVersion: "0.0.3"
          workerVersion: "0.0.3"
          agentImageRef: "docker.io/yyhuni/lunafox-agent@sha256:eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee"
          workerImageRef: "docker.io/yyhuni/lunafox-worker@sha256:ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
          EOF_MANIFEST_V3
          cp "$TMP_DIR/repo/raw/branch/manifests/v0.0.3.yaml" "$TMP_DIR/repo/branch/manifests/v0.0.3.yaml"

          python3 -m http.server "$PORT" --bind 127.0.0.1 --directory "$TMP_DIR" >/tmp/mock-http.log 2>&1 &
          HTTP_PID=$!
          sleep 1

          LUNAFOX_RELEASE_CHANNEL_BRANCH=branch \
          LUNAFOX_RELEASE_GITHUB_REPO=repo \
          LUNAFOX_RELEASE_GITEE_REPO=repo \
          LUNAFOX_RELEASE_GITHUB_RAW_BASE=http://127.0.0.1:9 \
          LUNAFOX_RELEASE_GITEE_RAW_BASE=http://127.0.0.1:${PORT} \
          ./install.sh --source auto --public-url https://127.0.0.1:19083 --non-interactive >/tmp/install-fallback.log 2>&1
          grep -q "安装器源测速" /tmp/install-fallback.log
          grep -q "安装器源排序" /tmp/install-fallback.log
          grep -q "安装器下载成功: source=gitee" /tmp/install-fallback.log

          LUNAFOX_RELEASE_CHANNEL_BRANCH=branch \
          LUNAFOX_RELEASE_GITHUB_REPO=repo \
          LUNAFOX_RELEASE_GITEE_REPO=repo \
          LUNAFOX_RELEASE_GITHUB_RAW_BASE=http://127.0.0.1:${PORT} \
          LUNAFOX_RELEASE_GITEE_RAW_BASE=http://127.0.0.1:9 \
          ./install.sh --source auto --channel githubok --public-url https://127.0.0.1:19083 --non-interactive >/tmp/install-github.log 2>&1
          grep -q "安装器源测速" /tmp/install-github.log
          grep -q "安装器源排序" /tmp/install-github.log
          grep -q "安装器下载成功: source=github" /tmp/install-github.log

          set +e
          LUNAFOX_RELEASE_CHANNEL_BRANCH=branch \
          LUNAFOX_RELEASE_GITHUB_REPO=repo \
          LUNAFOX_RELEASE_GITEE_REPO=repo \
          LUNAFOX_RELEASE_GITHUB_RAW_BASE=http://127.0.0.1:${PORT} \
          LUNAFOX_RELEASE_GITEE_RAW_BASE=http://127.0.0.1:${PORT} \
          ./install.sh --source gitee --channel bad --public-url https://127.0.0.1:19083 --non-interactive >/tmp/install-checksum.log 2>&1
          rc=$?
          set -e

          [ "$rc" -ne 0 ] || { cat /tmp/install-checksum.log; exit 1; }
          grep -q "安装器 sha256 校验失败" /tmp/install-checksum.log
          grep -q -- "--version v0.0.2 --source github" /tmp/install-checksum.log

      - name: Docs command consistency
        run: |
          set -euo pipefail
          if rg -n "install\\.sh --dev|start\\.sh --dev|restart\\.sh --dev|scripts/installer/build\\.sh|\\./dev-install\\.sh|\\./start-dev\\.sh|\\./restart-dev\\.sh" \
            --glob "*.md" --glob "!old/**" .; then
            echo "found outdated command references in markdown docs"
            exit 1
          fi

      - name: CI contract guard
        run: |
          set -euo pipefail
          if rg -n "build-base-tools\\.yml|build-ci-tools\\.yml|CI_TOOLS_IMAGE|BASE_TOOLS_IMAGE|Dockerfile\\.tools|WORKER_TOOLS_IMAGE" .github/workflows --glob '!test.yml'; then
            echo "detected forbidden CI contract keyword regression"
            exit 1
          fi

          if rg -n "CI_TOOLS_IMAGE|BASE_TOOLS_IMAGE|WORKER_TOOLS_IMAGE|Dockerfile\\.tools" \
            docs/ci-version-governance.md tools/installer/README.md scripts/ci/version_inventory.sh; then
            echo "detected forbidden docs/script keyword regression"
            exit 1
          fi

          [ ! -f worker/Dockerfile.tools ] || {
            echo "worker/Dockerfile.tools should not exist"
            exit 1
          }

      - name: Check repo naming conventions
        run: bash ./scripts/check-repo-naming.sh

  worker-tests:
    if: inputs.run_worker
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    env:
      GOMODCACHE: ${{ github.workspace }}/.cache/go/pkg/mod
      GOCACHE: ${{ github.workspace }}/.cache/go-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: worker/go.mod

      - name: Prepare writable cache directories
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOMODCACHE }}
            ${{ env.GOCACHE }}
          key: ${{ runner.os }}-go-cache-worker-${{ hashFiles('worker/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-cache-worker-

      - name: Run worker tests
        working-directory: worker
        run: make test

  server-tests:
    if: inputs.run_server
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    env:
      GOMODCACHE: ${{ github.workspace }}/.cache/go/pkg/mod
      GOCACHE: ${{ github.workspace }}/.cache/go-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Prepare writable cache directories
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOMODCACHE }}
            ${{ env.GOCACHE }}
          key: ${{ runner.os }}-go-cache-server-${{ hashFiles('server/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-cache-server-

      - name: Install server guard dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ripgrep

      - name: Check server DDD boundaries
        working-directory: server
        run: make check-ddd

      - name: Self-test server guards
        working-directory: server
        run: make check-guards-selftest

      - name: Run server tests
        working-directory: server
        run: make test

  agent-tests:
    if: inputs.run_agent
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    env:
      GOMODCACHE: ${{ github.workspace }}/.cache/go/pkg/mod
      GOCACHE: ${{ github.workspace }}/.cache/go-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod

      - name: Prepare writable cache directories
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOMODCACHE }}
            ${{ env.GOCACHE }}
          key: ${{ runner.os }}-go-cache-agent-${{ hashFiles('agent/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-cache-agent-

      - name: Run agent tests
        working-directory: agent
        run: make test

  installer-tests:
    if: inputs.run_installer
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    env:
      GOMODCACHE: ${{ github.workspace }}/.cache/go/pkg/mod
      GOCACHE: ${{ github.workspace }}/.cache/go-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tools/installer/go.mod

      - name: Prepare writable cache directories
        run: |
          set -euo pipefail
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOMODCACHE }}
            ${{ env.GOCACHE }}
          key: ${{ runner.os }}-go-cache-installer-${{ hashFiles('tools/installer/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-cache-installer-

      - name: Run installer tests
        working-directory: tools/installer
        run: go test ./...

      - name: Verify release channel schema contract
        run: bash ./scripts/installer/verify-channel-schema.sh ./tools/installer/testdata/channel-schema/v3.env

      - name: Installer cross-compile smoke
        working-directory: tools/installer
        run: |
          set -euo pipefail
          OUT_DIR="$(mktemp -d)"
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
                go build -trimpath -buildvcs=false -o "$OUT_DIR/lunafox-installer-${GOOS}-${GOARCH}" ./cmd/lunafox-installer
            done
          done
          ls -l "$OUT_DIR"

  test:
    runs-on: ubuntu-22.04
    if: always()
    needs:
      - frontend-and-scripts
      - worker-tests
      - server-tests
      - agent-tests
      - installer-tests
    steps:
      - name: Aggregate parallel test results
        run: |
          set -euo pipefail
          results=(
            "frontend-and-scripts:${{ needs.frontend-and-scripts.result }}"
            "worker-tests:${{ needs.worker-tests.result }}"
            "server-tests:${{ needs.server-tests.result }}"
            "agent-tests:${{ needs.agent-tests.result }}"
            "installer-tests:${{ needs.installer-tests.result }}"
          )

          failed=0
          for item in "${results[@]}"; do
            name="${item%%:*}"
            result="${item#*:}"
            echo "${name} => ${result}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "parallel test jobs contain failure/cancelled status"
            exit 1
          fi

          echo "All selected test jobs passed."
