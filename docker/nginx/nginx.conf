worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # 上游服务
  upstream backend {
    server server:8080;
  }

  upstream backend_grpc {
    server server:9090;
  }

  upstream frontend {
    server frontend:3000;
  }

  upstream loki {
    server loki:3100;
  }

  # HTTPS 反代（证书由安装器同步到 Docker volume，并挂载到 /etc/nginx/ssl）
  server {
    listen 8083 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50m;

    # HTTP 请求到 HTTPS 端口时自动跳转
    error_page 497 =301 https://$host:$server_port$request_uri;

    # 指纹特征 
    add_header X-Powered-By "LunaFox ASM" always;

    # Runtime gRPC services (AgentRuntimeService + AgentDataProxyService)
    location ~ ^/lunafox\.runtime\.v1\.(AgentRuntimeService|AgentDataProxyService)/ {
      grpc_set_header Host $host;
      grpc_set_header X-Real-IP $remote_addr;
      grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      grpc_set_header X-Forwarded-Proto $scheme;
      grpc_set_header X-Forwarded-Host $host;
      grpc_set_header X-Forwarded-Port $server_port;
      grpc_read_timeout 86400s;  # 24小时，支持长连接 stream
      grpc_send_timeout 86400s;
      grpc_pass grpc://backend_grpc;
    }

    # 健康检查
    location /health {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_read_timeout 30s;
      proxy_send_timeout 30s;
      proxy_pass http://backend;
    }

    location /api/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_read_timeout 300s;  # 5分钟，支持大数据量导出
      proxy_send_timeout 300s;
      proxy_pass http://backend;
    }

    # Loki ingress for agent push/query
    location /loki/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
      proxy_pass http://loki;
    }

    # Next.js HMR (dev)
    location /_next/webpack-hmr {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_read_timeout 86400;
    }

    # 前端反代
    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://frontend;
    }
  }
}
