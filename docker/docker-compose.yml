# ============================================
# Production configuration - using prebuilt Docker Hub images
# ============================================
name: lunafox

services:
  # PostgreSQL (optional; do not start when using a remote database)
  postgres:
    profiles: ["local-db"]
    image: postgres:16.3-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.6.6
    restart: always
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-verify-config=true", "-config.file=/etc/loki/loki-config.yaml"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    image: ${IMAGE_REGISTRY:-docker.io}/${IMAGE_NAMESPACE:-yyhuni}/lunafox-server:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: always
    env_file:
      - .env
    environment:
      - IMAGE_TAG=${IMAGE_TAG}
      - PUBLIC_URL=${PUBLIC_URL:-}
      - LOKI_URL=${LOKI_URL:-http://loki:3100}
      - SERVER_GRPC_PORT=${SERVER_GRPC_PORT:-9090}
    depends_on:
      redis:
        condition: service_healthy
      loki:
        condition: service_healthy
    volumes:
      - lunafox_data:/opt/lunafox
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: ${IMAGE_REGISTRY:-docker.io}/${IMAGE_NAMESPACE:-yyhuni}/lunafox-frontend:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: always
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000',res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  nginx:
    image: ${IMAGE_REGISTRY:-docker.io}/${IMAGE_NAMESPACE:-yyhuni}/lunafox-nginx:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: always
    depends_on:
      server:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${PUBLIC_PORT:?PUBLIC_PORT is required}:8083"
    volumes:
      - lunafox_ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
  lunafox_data:
    name: lunafox_data
  lunafox_ssl:
    name: lunafox_ssl
  loki_data:
    name: lunafox_loki_data

networks:
  default:
    name: lunafox_network  # 固定网络名，不随目录名变化
